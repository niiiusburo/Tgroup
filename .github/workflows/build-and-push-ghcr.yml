name: Build and Push Docker Images to GHCR

on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Extract version from website/package.json for tagging
  # ============================================================
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and SHA
        id: version
        run: |
          VERSION=$(grep '"version"' website/package.json | head -1 | sed 's/.*: "\(.*\)",/\1/')
          SHA=${{ github.sha }}
          SHA_SHORT=${SHA:0:7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

  # ============================================================
  # Build and Push Docker Images (Parallel Matrix)
  # ============================================================
  build-and-push:
    name: Build and Push ${{ matrix.image }}
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tgroup-api
            dockerfile: Dockerfile.api
            context: .
          - image: tgroup-web
            dockerfile: Dockerfile.web
            context: .
          - image: tgroup-face
            dockerfile: face-service/Dockerfile
            context: face-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine push condition
        id: push
        run: |
          # Only push on push events to main or on tags
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ./${{ matrix.dockerfile }}
          push: ${{ steps.push.outputs.should_push }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tgroup-${{ matrix.image }}:${{ needs.extract-version.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/tgroup-${{ matrix.image }}:sha-${{ needs.extract-version.outputs.sha_short }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/tgroup-{1}:main', github.repository_owner, matrix.image) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/{0}/tgroup-{1}:v{2}', github.repository_owner, matrix.image, needs.extract-version.outputs.version) || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ============================================================
  # Summary Job: Report Deployed Tags
  # ============================================================
  summary:
    name: Build Summary
    needs: [extract-version, build-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images Built:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/tgroup-tgroup-api:${{ needs.extract-version.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/tgroup-tgroup-web:${{ needs.extract-version.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/tgroup-tgroup-face:${{ needs.extract-version.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Short SHA:** \`${{ needs.extract-version.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cache Scopes:**" >> $GITHUB_STEP_SUMMARY
          echo "- api: \`type=gha,scope=tgroup-api\`" >> $GITHUB_STEP_SUMMARY
          echo "- web: \`type=gha,scope=tgroup-web\`" >> $GITHUB_STEP_SUMMARY
          echo "- face: \`type=gha,scope=tgroup-face\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** No \`:latest\` tag is pushed. Use explicit semver tags (e.g., \`v0.31.29\`) or short SHA (e.g., \`sha-abc1234\`) for deployment. This prevents tag mutability issues and enables safe rollbacks." >> $GITHUB_STEP_SUMMARY
