name: Services Catalog
summary: |
  Dental service catalog is stored in the legacy dbo.products table.
  The backend route /api/Products handles CRUD; /api/Services is unmounted dead code
  targeting a non-existent public.services table. ProductCategories manage
  service groupings. The current service catalog page is /service-catalog;
  /website is the Website CMS surface. SaleOrders and SaleOrderLines handle
  actual patient treatments.
owns:
  - api/src/routes/products.js
  - api/src/routes/productCategories.js
  - api/src/routes/saleOrders.js
  - api/src/routes/saleOrderLines.js
  - api/src/routes/dotKhams.js (read-only treatment-round context)
  - website/src/pages/ServiceCatalog.tsx
  - website/src/pages/Services/index.tsx
  - website/src/components/services/
  - website/src/lib/api/products.ts
  - website/src/lib/api/saleOrders.ts
  - website/src/hooks/useProducts.ts
  - website/src/hooks/useServices.ts
reads:
  - api/src/db.js
writes:
  - dbo.products (insert/update/delete)
  - dbo.productcategories (insert/update/delete)
  - dbo.saleorders (create + state patch)
  - dbo.saleorderlines (CRUD via saleOrderLines route)
  - dbo.saleorder_state_logs (audit logging)
  - dbo.dotkhams (payment residual context)
tables:
  - dbo.products
  - dbo.productcategories
  - dbo.companies
  - dbo.saleorders
  - dbo.saleorderlines
  - dbo.saleorder_state_logs
  - dbo.dotkhamsteps (linked product usage)
  - dbo.dotkhams
endpoints:
  - GET    /api/Products
  - GET    /api/Products/:id
  - POST   /api/Products
  - PUT    /api/Products/:id
  - DELETE /api/Products/:id
  - GET    /api/ProductCategories
  - POST   /api/ProductCategories
  - PUT    /api/ProductCategories/:id
  - DELETE /api/ProductCategories/:id
  - GET    /api/SaleOrders
  - GET    /api/SaleOrders/lines
  - GET    /api/SaleOrders/:id
  - POST   /api/SaleOrders
  - PATCH  /api/SaleOrders/:id
  - PATCH  /api/SaleOrders/:id/state
  - GET    /api/SaleOrderLines
  - DELETE /api/SaleOrderLines/:id
  - GET    /api/DotKhams
  - GET    /api/DotKhams/:id
ui_surfaces:
  - /service-catalog (service catalog, routed to ServiceCatalog in App.tsx)
  - /website is Website CMS, not the service catalog
  - /services (patient service records)
  - ServiceCatalogSelector
  - ServiceForm
  - ServiceHistoryList
jobs:
  - none
shared_types:
  - website/src/types/service.ts
  - website/src/lib/api/products.ts
  - website/src/lib/api/saleOrders.ts
dependencies:
  - dbo.products must remain compatible with saleorderlines/dotkhamsteps FKs
  - product delete blocked if linked saleorderlines or dotkhamsteps exist
  - Sale order treatment records use `/api/SaleOrders/lines`; `/api/SaleOrderLines/:id` soft-deletes a line and soft-deletes the parent order when it was the last active line. Customer balance must ignore that soft-deleted parent order.
affected_by:
  - Schema changes to dbo.products (price fields, canorderlab, active)
  - Dead unmounted route api/src/routes/services.js must not be revived accidentally
impact_tests:
  - website/src/__tests__/ServiceCatalog.test.tsx
  - website/src/components/services/serviceFormToothQuantity.test.ts
  - website/e2e/export-downloads.spec.ts (services/service-catalog export menus)
  - website/e2e/team-bravo-records.spec.ts
risk_level: high
notes:
  - STALE/DEAD: api/src/routes/services.js is not mounted in server.js and queries public.services which does not exist.
  - STALE/DEAD: website/src/lib/api/services.ts exports dead wrappers.
  - Current routing: /service-catalog renders ServiceCatalog, /services renders patient treatment records, and /website renders the Website CMS page.
  - Current frontend guards: /service-catalog uses `services.view`, while /services patient treatment records still use `customers.edit` even though backend sale-order read routes use `services.view`.
  - /api/ProductCategories groups duplicate migrated category UUIDs by display name for the catalog sidebar; /api/Products category filtering expands the selected display group to all matching category UUIDs.
  - Service catalog and patient treatment searches must remain accent-insensitive for Vietnamese service, category, doctor, and customer names.
  - Customer profile service edits patch the parent sale order but must also persist rendered line fields such as `saleorderlines.productuomqty`, `tooth_numbers`, and `tooth_comment` because the `Phiếu khám` table is sourced from `/api/SaleOrders/lines`.
  - Customer source chips in ServiceForm must be persisted UUIDs from the active LOB only; do not show or submit fallback IDs such as `src-1` to `SaleOrders.sourceid`.
  - Tooth picker saves should sync quantity to selected tooth count only while quantity is still following the picker/default count; manual quantity overrides must be preserved.
  - Patient service form dates must use the compact shared in-flow DatePicker, and the form scroll body must reserve enough space so fixed action footers never cover the open calendar.
