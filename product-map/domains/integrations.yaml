name: External Integrations
summary: |
  Face-recognition check-in via selectable local OpenCV YuNet+SFace or
  CompreFace providers, and external health-checkup sync via Hosoonline API.
  Both integration families are optional features gated by env configuration.
owns:
  - api/src/routes/faceRecognition.js
  - api/src/routes/faceCheckin.js
  - api/src/routes/externalCheckups.js
  - api/src/routes/publicTelemetryErrors.js
  - api/src/services/faceEngineClient.js
  - api/src/services/comprefaceClient.js (legacy fallback)
  - api/src/services/faceMatchEngine.js
  - api/src/services/faceDiagnostics.js
  - api/src/services/larkNotifier.js
  - website/src/components/customer/CustomerCameraWidget.tsx
  - website/src/components/shared/FaceCaptureModal.tsx
  - website/src/components/modules/PatientCheckIn.tsx
  - website/src/pages/CheckIn/CheckIn.tsx
  - website/src/hooks/useFaceRecognition.ts
  - website/src/hooks/useExternalCheckups.ts
reads:
  - api/src/db.js
  - process.env.FACE_SERVICE_URL
  - process.env.FACE_RECOGNITION_PROVIDER
  - process.env.FACE_DIAGNOSTICS_ENABLED
  - process.env.FACE_DIAGNOSTICS_DIR
  - process.env.FACE_DIAGNOSTICS_HASH_SALT
  - process.env.COMPREFACE_URL
  - process.env.COMPREFACE_API_KEY
  - process.env.HOSOONLINE_BASE_URL
  - process.env.HOSOONLINE_API_KEY
  - process.env.HOSOONLINE_USERNAME
  - process.env.HOSOONLINE_PASSWORD
  - process.env.LARK_FEEDBACK_WEBHOOK_URL
  - process.env.LARK_FEEDBACK_WEBHOOK_SECRET
  - process.env.TGROUP_PUBLIC_URL
writes:
  - dbo.partners (face_subject_id, face_registered_at)
  - dbo.customer_face_embeddings
  - api/uploads/face-diagnostics/ (hidden JSONL diagnostics)
  - api/uploads/feedback/ (indirect, shared storage)
tables:
  - dbo.partners
  - dbo.customer_face_embeddings
endpoints:
  - POST /api/face/recognize
  - POST /api/face/register
  - POST /api/face/re-register
  - GET  /api/face/status/:partnerId
  - POST /api/public/face/checkin
  - GET  /api/ExternalCheckups/images/:imageName
  - GET  /api/ExternalCheckups/:customerCode
  - POST /api/ExternalCheckups/:customerCode/patient
  - POST /api/ExternalCheckups/:customerCode/health-checkups
  - POST https://open.larksuite.com/open-apis/bot/v2/hook/* (outbound only, optional)
ui_surfaces:
  - PatientCheckIn
  - /checkin public Face ID kiosk
  - CustomerCameraWidget
  - FaceCaptureModal
  - HealthCheckupGallery
jobs:
  - none (Compreface runs as standalone Docker containers)
shared_types:
  - website/src/hooks/useFaceRecognition.ts
  - website/src/lib/api/externalCheckups.ts
dependencies:
  - Customers & Partners
  - Docker services: face-service (OpenCV YuNet+SFace), compreface-api, compreface-core, compreface-postgres-db
affected_by:
  - Changes to Compreface image size limits
  - Changes to Hosoonline API contract
  - Network reachability between api container and compreface-api
impact_tests:
  - website/src/hooks/__tests__/useFaceRecognition.test.ts
  - api/tests/faceRecognition.test.js
  - api/src/services/__tests__/faceDiagnostics.test.js
  - api/src/services/__tests__/faceMatchEngine.test.js
  - api/src/services/__tests__/comprefaceFaceProvider.test.js
  - api/src/routes/__tests__/externalCheckups.test.js
  - website/src/components/customer/AuthenticatedCheckupImage.test.tsx
risk_level: medium
notes:
  - Lark feedback alerts are optional and env-gated. The API process posts a text alert to the configured T-Group custom bot webhook only after a manual feedback thread or auto-detected telemetry feedback thread has committed locally.
  - `FACE_RECOGNITION_PROVIDER=local` uses the Python FastAPI face-service with OpenCV YuNet (detection) and SFace (128-dim embedding extraction).
  - `FACE_RECOGNITION_PROVIDER=compreface` uses CompreFace recognition subjects keyed by `partners.id`; TGClinic still updates `partners.face_subject_id` and `face_registered_at`.
  - CompreFace registration/status must query `/faces?subject=<partners.id>`; `partners.face_subject_id` without at least one CompreFace example is not a registered face.
  - Public `/checkin` must keep a visible flip-camera control and softened on-screen privacy preview while sending an unblurred, center-cropped capture frame to the Face ID provider.
  - Public and staff Face ID recognition write hidden diagnostics under `uploads/face-diagnostics/` with hashed subject/IP/user-agent identifiers, thresholds, top-score margin, reason codes, and latency; diagnostics must not store raw images, raw embeddings, names, phones, customer codes, or raw partner IDs.
  - Compreface services are defined in docker-compose.yml but are not required for core app startup.
  - "Hosoonline is currently mixed-contract: login credentials take precedence for image reads (`Authorization: Bearer <token>` plus access_token cookie); `HOSOONLINE_API_KEY` / `X-API-Key` remains as fallback for older patient health-checkup endpoints."
  - The current observed Hosoonline website contract logs in through `/api/auth/login`, searches appointment media through `/api/appointments/search?q=<customerCode>&page=<page>`, and fetches bytes through `/api/appointments/image/:imageName`.
  - Hosoonline v2 API-key patient collection endpoints are routed through `/api/patients/_create` and `/api/patients/_search`; TGClinic proxies patient creation through `POST /api/ExternalCheckups/:customerCode/patient`.
  - New Hosoonline patient codes are generated from the local TDental customer code plus the last four phone digits as a prefix, for example `T8250` + phone ending `6397` becomes `6397T8250`.
  - Operational clinic roles can be granted `external_checkups.view` for read-only Hồ sơ online access without upload controls. Patient creation uses `external_checkups.create`; image/checkup upload uses `external_checkups.upload`.
  - TGClinic must proxy Hosoonline images because direct image URLs require Hosoonline session auth.
  - Upload still posts to the older `/api/patients/:code/health-checkups` endpoint with repeated `photos` fields plus required `service` and `doctor`; `date`, `description`, `nextAppointmentDate`, and `nextDescription` are optional. When the local ref differs from Hosoonline, resolve the upload code from appointment search `customerCode`.
  - Hosoonline accepts JPEG, PNG, HEIC/HEIF, and WebP uploads up to 20 MB per photo; TGClinic prepares large browser uploads as high-quality JPEG before submit and keeps backend normalization as a fallback.
  - When only `HOSOONLINE_API_KEY` is configured, `/api/patients?code=...` may require token auth while `/api/patients/:code/health-checkups` still accepts the API key, so upload resolution must not let optional search auth failures block the upload attempt.
