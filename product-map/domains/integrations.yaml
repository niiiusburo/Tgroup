name: External Integrations
summary: |
  Face-recognition check-in via Compreface Docker services, and external
  health-checkup sync via Hosoonline API. Both are optional features gated
  by env configuration.
owns:
  - api/src/routes/faceRecognition.js
  - api/src/routes/externalCheckups.js
  - api/src/services/comprefaceClient.js
  - website/src/components/customer/CustomerCameraWidget.tsx
  - website/src/components/shared/FaceCaptureModal.tsx
  - website/src/components/modules/PatientCheckIn.tsx
  - website/src/hooks/useFaceRecognition.ts
  - website/src/hooks/useExternalCheckups.ts
reads:
  - api/src/db.js
  - process.env.COMPREFACE_URL
  - process.env.COMPREFACE_API_KEY
  - process.env.HOSOONLINE_BASE_URL
  - process.env.HOSOONLINE_API_KEY
  - process.env.HOSOONLINE_USERNAME
  - process.env.HOSOONLINE_PASSWORD
writes:
  - dbo.partners (face_subject_id, face_registered_at)
  - api/uploads/feedback/ (indirect, shared storage)
tables:
  - dbo.partners
endpoints:
  - POST /api/face/recognize
  - POST /api/face/register
  - GET  /api/ExternalCheckups/images/:imageName
  - GET  /api/ExternalCheckups/:customerCode
  - POST /api/ExternalCheckups/:customerCode/patient
  - POST /api/ExternalCheckups/:customerCode/health-checkups
ui_surfaces:
  - PatientCheckIn
  - CustomerCameraWidget
  - FaceCaptureModal
  - HealthCheckupGallery
jobs:
  - none (Compreface runs as standalone Docker containers)
shared_types:
  - website/src/hooks/useFaceRecognition.ts
  - website/src/lib/api/externalCheckups.ts
dependencies:
  - Customers & Partners
  - Docker services: compreface-api, compreface-core, compreface-postgres-db
affected_by:
  - Changes to Compreface image size limits
  - Changes to Hosoonline API contract
  - Network reachability between api container and compreface-api
impact_tests:
  - website/src/hooks/__tests__/useFaceRecognition.test.ts
  - api/tests/faceRecognition.test.js
  - api/src/routes/__tests__/externalCheckups.test.js
  - website/src/components/customer/AuthenticatedCheckupImage.test.tsx
risk_level: medium
notes:
  - Compreface services are defined in docker-compose.yml but not required for core app startup.
  - "Hosoonline is currently mixed-contract: login credentials take precedence for image reads (`Authorization: Bearer <token>` plus access_token cookie); `HOSOONLINE_API_KEY` / `X-API-Key` remains as fallback for older patient health-checkup endpoints."
  - The current observed Hosoonline website contract logs in through `/api/auth/login`, searches appointment media through `/api/appointments/search?q=<customerCode>&page=<page>`, and fetches bytes through `/api/appointments/image/:imageName`.
  - Hosoonline v2 API-key patient collection endpoints are routed through `/api/patients/_create` and `/api/patients/_search`; TGClinic proxies patient creation through `POST /api/ExternalCheckups/:customerCode/patient`.
  - New Hosoonline patient codes are generated from the local TDental customer code plus the last four phone digits as a prefix, for example `T8250` + phone ending `6397` becomes `6397T8250`.
  - TGClinic must proxy Hosoonline images because direct image URLs require Hosoonline session auth.
  - Upload still posts to the older `/api/patients/:code/health-checkups` endpoint with `photos`, `service`, and `description`; when the local ref differs from Hosoonline, resolve the upload code from appointment search `customerCode`.
  - When only `HOSOONLINE_API_KEY` is configured, `/api/patients?code=...` may require token auth while `/api/patients/:code/health-checkups` still accepts the API key, so upload resolution must not let optional search auth failures block the upload attempt.
