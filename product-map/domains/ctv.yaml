name: CTV (Cộng tác viên / Referrer) Role & Dashboard (v2)
summary: |
  Dedicated role for external referrers (CTV). Flagged by partners.is_ctv = true (additive column on partners table in dental DB; mirrored in cosmetic DB).
  CTV partners have empty lob_scope; on login hard-redirected to /ctv and 403'd on any admin route (including cosmetic/dental mirrors).
  Permissions: ctv.dashboard.view, ctv.commission.view.self, ctv.referrals.view.self (and lob.crossview for admins viewing CTV data).
  Single UI surface: mobile-first bilingual 5-tab dashboard (Home, Commission, Tracking, Network, Me) at /ctv with bottom nav and in-portal EN/VI toggle.
  /api/ctv/commission-summary aggregates earnings from BOTH physical DBs (tdental_demo.earnings + tcosmetic_demo.earnings) server-side for the authenticated CTV partner only (via recipient_partner_id).
  /api/ctv/referrals (Theo dõi / Tracking tab) lists clients from operational cards only (appointments.ctv_id ∪ saleorders.ctv_id) via ctvCardTrackingReferrals.js; computeCtvLink filters by latest winning card per LOB.
  /api/ctv/client-journeys delegates to buildCardTrackingReferrals (same card set as GET /referrals) and maps to legacy journey shape for backward compat.
  Commission (Home/Hoa hồng) requires saleorders.ctv_id on the service card; profile referred_by_ctv_id does not grant money.
  Shows pending/paid, LOB-tagged activity, referred clients across LOBs, split bars, etc. per visual companion. D13 recipient resolution powers the rows.
  CTV is the only surface that intentionally crosses the two DBs (composition in API, no SQL JOIN).
  CTV v3 business authority lives in docs/business-logic/ctv-referral-commission.md:
  CTV booking is appointment-only; CTV earnings are created ONLY from service cards with an explicitly selected CTV (DEC-20260610-01 — no referrer inheritance), based on full service price, using CTV tier config.
  Claim locks are per LOB, not cross-LOB. Public signup can create a root/top-level CTV when no upline is supplied.
owns:
  - api/src/routes/ctv.js and ctv* helper modules (commission-summary + client-journeys cross-DB aggregators using getDb on both)
  - api/src/routes/ctvProfile.js + api/src/services/ctvSelfProfile.js (self-scoped name/password account settings)
  - website/src/pages/CTV/* (CtvDashboard, CtvHome, CtvCommission, CtvTracking, CtvMe)
  - website/src/lib/api/ctv.ts
  - website/src/lib/i18n/ctv.ts
  - website/src/components/ctv/* (LOB pills, split bars, bottom nav)
  - Login redirect logic in AuthContext / ProtectedRoute / LoginRoute
  - api/src/services/loginIdentifier.js (CTV phone/ref-code login lookup for ALL active is_ctv partners; legacy SHA-256 password fallback still created_via-gated — see INV-008C)
  - api/src/services/nk3CtvIntegrityRepair.js + scripts/nk3-only/nk3-live-ctv-integrity-repair.js (NK3-only live integrity planner/repair for CTV identity mirrors after fresh DB backups)
reads:
  - tdental_demo.dbo.partners (is_ctv flag for role gating; referred_by_ctv_id for referred clients)
  - tdental_demo.dbo.earnings (CTV's rows via recipient_partner_id; D13 source)
  - tcosmetic_demo.dbo.earnings (same for cosmetic LOB referrals)
  - tdental_demo.dbo.partners (referred clients on dental side)
  - tcosmetic_demo.dbo.partners (referred clients on cosmetic side via referred_by_ctv_id)
  - Both DBs: payouts for paid status
  - Both DBs: appointments/payments/service-line fields indirectly through earnings-derived journey status
writes:
  - POST /api/ctv (create CTV under caller/admin; writes partners in dental and optionally cosmetic)
  - POST /api/ctv/clients (refer a client under caller/admin; writes partners in selected LOB DB; target rule blocks active same-LOB ownership by a different CTV and does not cross-block the other LOB)
  - POST /api/ctv/bookings (create or reclaim referred client after resolving a selected-LOB appointment company, preferring real clinic fallback locations over QA/test fixture rows; mark accepted existing partners as customer-visible, create appointment only in selected LOB DB; selected service or Referral Start default stays on appointments.productid and does not create a service card)
  - PATCH /api/ctv/me (authenticated CTV self-service display name update; mirrors the CTV partner row by UUID when present in Dental/Cosmetic)
  - POST /api/ctv/me/password (authenticated CTV self-service password update after current-password verification; writes bcrypt password_hash to mirrored CTV rows)
  - PUT /api/Ctvs/:id (admin edit: name, phone, email, password, lob_scope, is_live; mirrors to cosmetic row if present)
  - POST /api/ctv-public/bookings (public landing no-login booking; resolves active CTV by submitted CTV phone, then uses the same claim/reclaim + appointment-only write path)
  - PATCH /api/Ctvs/:id or /api/cosmetic/Ctvs/:id (admin suspend/reactivate; mirrors active flag to cosmetic row if present)
  - api/scripts/import-legacy-ctvs.js after explicit DB confirmation (mirrors safe legacy CTV identities into dental + cosmetic partners with identical UUIDs; skips ambiguous matches)
  - earnings target behavior: written when a service card with selected CTV is created, or when no CTV is selected but the customer partner has an active recorded `referred_by_ctv_id`; based on full service price and CTV tier config; older payment-path commissionEngine behavior is a compatibility gap for CTV
  - admin service-card CTV reassignment target behavior: before payout, reverse old pending CTV earnings and create new pending CTV earnings; after payout, block reassignment
  - admin appointment-card CTV reassignment target behavior: change ownership/claim owner without commission money movement
tables:
  - tdental_demo.dbo.partners (+ is_ctv BOOLEAN, lob_scope)
  - tdental_demo.dbo.earnings (owned by earnings domain; filter by recipient_partner_id = current CTV)
  - tcosmetic_demo.dbo.earnings (identical)
  - tdental_demo.dbo.payouts
  - tcosmetic_demo.dbo.payouts
  - tdental_demo.dbo.ctv_discount_codes (discount QR codes; dental DB only; append usage audit)
endpoints:
  - GET /api/ctv/commission-summary (auth: is_ctv + ctv.commission.view.self; returns aggregates + per-LOB breakdown + recent rows with source)
  - GET /api/ctv/referrals (Theo dõi: card-based — appointments.ctv_id ∪ saleorders.ctv_id; per-LOB lob_links + computeCtvLink 6mo window)
  - GET /api/ctv/client-journeys (card-based via buildCardTrackingReferrals + journey stage mapping; same client authority as /referrals)
  - GET /api/ctv/commission-summary (earnings ledger; L0 attribution from saleorders.ctv_id service cards only)
  - GET /api/ctv/me (profile)
  - PATCH /api/ctv/me (self display-name update)
  - POST /api/ctv/me/password (self password change)
  - POST /api/ctv (self/admin CTV recruit)
  - POST /api/ctv/clients (self/admin referred client create; target gate is same-LOB B_CLIENT_CLAIMED only; same-LOB duplicates still surface as U_DUPLICATE_PHONE)
  - GET /api/ctv/network (self CTV upline/direct/downline graph)
  - POST /api/ctv/bookings (self/admin referred-client booking; blocks B_CLIENT_CLAIMED; accepted existing partners are updated to customer=true)
  - GET /api/ctv-public/client-lookup (public landing read-only phone lookup; optional ctvPhone distinguishes claimedByMe from claimed-by-other)
  - GET /api/ctv-public/ctv-lookup (public landing read-only active CTV phone verification for booking attribution and signup upline fields)
  - GET /api/ctv-public/services (public landing service picker catalog scoped by lob)
  - POST /api/ctv-public/bookings (public landing booking; body requires phone, date, ctvPhone; creates/reclaims client + appointment only)
  - GET /api/ctv-public/refcode/:code (public CTV signup referral-code lookup; returns only upline display identity)
  - POST /api/ctv-public/join (public CTV signup; body accepts code or uplinePhone plus name, phone, optional email, password; target allows root CTV creation when code/uplinePhone are omitted)
  - GET /api/Ctvs and GET /api/cosmetic/Ctvs (admin CTV list; cosmetic mount filters Cosmetic-scoped rows and returns source/legacy_code/created_via)
  - GET /api/ctv/* (gated)
  - GET /api/discount-codes/landing/:shortCode (public fan landing preview; no auth; resolves CTV by CTV-{idPrefix})
  - GET /api/discount-codes/check-existing?ctvId= (public fan dedup by cookie + visitor IP; read-only)
  - POST /api/discount-codes/generate (public fan claim OR authenticated CTV portal forceNew; optional auth)
  - GET /api/discount-codes/mine (CTV self code history)
  - GET /api/discount-codes/stats (CTV aggregate code stats)
  - GET /api/discount-codes/lookup?code= (staff preview)
  - GET /api/discount-codes/client-search?phone=&lob=&code= (staff LOB-specific client lookup; mirrors /api/ctv/client-lookup vs issuing CTV)
  - POST /api/discount-codes/verify (staff marks code used; reclaim/create client under issuing CTV)
  - POST /api/discount-codes/ensure (legacy CTV short-code upsert; backward compatible)
ui_surfaces:
  - /ctv (full bypass of admin Layout/sidebar; mobile-first with bottom nav 4 tabs; also usable desktop; EN/VI switcher in the CTV header)
    - Header: compact orange motion pill; hides on downward scroll, returns on upward scroll/focus, and groups Refer Client + Recruit CTV as a smaller pill action menu.
    - Refer Client sheet: appointment date uses the shared in-flow app DatePicker, not the mobile browser native `type=date` picker, so opening the calendar pushes later fields/buttons instead of covering them. Refer Client and Recruit CTV sheets keep the close button in a non-scrolling header while the form body scrolls inside the mobile viewport.
    - Home: greeting + pending tile (split dental/cosmetic) + this-month + recent activity feed with [den]/[cos] pills
    - Commission: Pending/Paid segmented; earnings list (client, service, amount, LOB pill)
    - Tracking: referred clients by stage (referred, visited, serviced, paid) with LOB pills and earned/estimated commission context
    - Me: profile, visible /ctv/join?ref=CTV-... invite link with share/copy-link actions, self display-name form, self password form, current language label, logout
    - Referral/QR tab (Giới thiệu/QR): sub-tabs Mạng lưới + Mã QR. Mode A share link `/ctv/discount/CTV-{idPrefix}` (fan claims code on landing). Mode B per-click voucher PNG with staff-verify QR. Mã của tôi history panel.
  - /ctv/discount/:shortCode (public fan landing; claim → voucher QR encoding /verify-discount?code=)
  - /verify-discount (staff scan flow; staff login required; LOB-first client lookup + verify)
discount_qr:
  description: |
    NK3 KOL-parity CTV discount QR (Giới thiệu/QR tab). Codes stored in tdental_demo.dbo.ctv_discount_codes only.
    Two tiers driven by `partners.is_live` + `systempreferences` settings (migration 064):
      - LIVE: `discount.live_percent` / `discount.live_expiry_days` / `discount.live_slogan` (default 30% / 60 days).
      - NON-LIVE: `discount.nonlive_percent` / `discount.nonlive_expiry_days` / `discount.nonlive_slogan` (default 10% / 30 days).
    Admin toggles `is_live` per CTV via Edit CTV modal; mirrors to both DBs.
    Settings are read at code-generation time and locked into the code row (snapshot).
    Earnings on verify: deferred (Phase 2 — see website/public/inter.html S9).
  modes:
    link_share: CTV copies/shares `/ctv/discount/CTV-{idPrefix}`; fan opens landing and taps claim to receive personal code + QR.
    voucher_png: CTV taps generate/download; each click creates a new code; QR encodes staff verify URL.
  staff_verify:
    auth: staff only (CTV accounts blocked with S_STAFF_REQUIRED)
    client_rules: LOB picker first, then phone lookup in that LOB; same claim gate as CTV refer/booking vs issuing CTV from code; reclaim referred_by_ctv_id on verify; createIfMissing when new in LOB.
  public_api_gate: landing, check-existing, and fan POST /generate bypass global requireAuth via isPublicApiPath (api/src/middleware/publicApiPaths.js).
  - Hard redirect on login for partners.is_ctv=true (before any admin mount)
  - 403 guards on all / (admin) routes for CTV
  - /commission admin five-step CTV flow (Config, CTV, New Clients, Earnings, Payouts) with URL-backed breadcrumb rail, clean date labels, profile drilldowns from New Clients, referral revenue/COM audit totals, missing-COM badges, and LOB-aware export/payment surfaces
  - /commission > CTV tab (admin only; LOB-aware list with source badges so legacy imports are visibly distinguishable)
  - /welcome public landing: Đặt Lịch Cho Khách opens the refer-client sheet without login, asks for customer phone first, then name, then CTV phone, live-verifies that CTV phone through /api/ctv-public/ctv-lookup, and submits through /api/ctv-public/bookings only when the CTV exists.
  - /welcome public landing: Đăng Ký CTV loads /ctv/join without login; visitors can enter an upline CTV phone/referral code to attach below an existing CTV, or omit upline to create an active root/top-level CTV. Phone and password are required; email is optional and must be clear in the UI.
  - Admin CTV hierarchy target surface: drag-and-drop hierarchy tree for moving uplines/downlines, allowed only for fresh CTVs with no referred customer, service, or earning activity, with automatic audit log.
creation:
  ssot_module: website/src/components/shared/CtvCreationForm/
  description: |
    SSOT (hook + presentational form + types) for *all* CTV account creation UIs/flows.
    Config-driven (modes: admin | portal-recruit | public-join). Strictly prop-driven.
    See co-located README.md + root AGENTS.md §5.1 (CTV / Identity Domain SSOT Enforcement).
    @crossref maintained in SSOT + call sites on every edit.
  call_sites:
    - website/src/components/commission/CtvManagementTab.tsx (AddCtvModal, mode: 'admin', uses createCtv wrapper + labels from 'commission'/'common' ns)
    - website/src/components/ctv/CtvRecruitModal.tsx (mode: 'portal-recruit', uses createCtv + CtvModalSheet, labels from 'ctv' ns)
    - website/src/pages/CTV/JoinCtv.tsx (mode: 'public-join', uses joinCtv wrapper + uplinePhone gate + beforeLobs slot + rootSignupEnabled VITE flag; labels mostly hardcoded + emailOptional note)
  invariants:
    - email optional by default (converged); omitted from clean CtvCreatePayload if falsy/blank (no dup-check); UI note via labels.emailOptional; backend stores NULL.
    - lob_scope: dental *always forced* (hook initial + toggle guard + normalizeLobs; backend always includes + uses for dental auth row + writes). Cosmetic additive/optional.
    - required core: name, phone, password (min length 6). Per-field errors + form errors drive red borders + canSubmit/disable.
    - specific errors (client+server parity): VALIDATION (missing), U_DUPLICATE_PHONE, U_DUPLICATE_EMAIL (only if supplied), U_WEAK_PASSWORD, U_UPLINE_REQUIRED (public unless root enabled), S_CTV_CREATE_FORBIDDEN, E_CTV_CREATE_FAILED (cross-DB atomicity failure).
    - clean payload: trimmed strings; lob_scope normalized with dental; onSubmit caller adds page-specific (code/uplinePhone/referred_by).
    - All changes to this domain require atomic same-commit updates to: the 3 call sites + backend (ctv.js + ctvPublic.js) + this yaml + tests + CHANGELOG + @crossref (per AGENTS.md §5.1 + §16). Violation = task failed.
  before_new_surface: |
    Before adding any new create-CTV form or modal: import { CtvCreationForm, useCtvCreationForm } (or from shared barrel) and extend config if needed. Never duplicate.
shared_types:
  - website/src/lib/api/ctv.ts : CtvCommissionSummary, CtvReferral, CommissionRow (with lob tag)
  - api/src/routes/ctv.js payload contracts
dependencies:
  - Earnings (D13 engine produces the rows; CTV only reads)
  - Auth (is_ctv flag + redirect + permission checks)
  - BusinessUnitContext (not used by CTV; they have no scope)
affected_by:
  - commissionEngine changes (D13 order or earnings shape)
  - Auth me/login augmentation; CTV phone/ref-code login lookup now covers all active is_ctv partners (INV-008C; legacy SHA-256 fallback stays import-marker gated)
  - Any partners column rename
impact_tests:
  - CTV login lands on /ctv, 403 on admin
  - Non-legacy CTV (created_via='admin_create'/'self_signup', phone + bcrypt password, no email) authenticates via POST /api/Auth/login and a wrong password is rejected (INV-008C)
  - Admin /commission CTV tab shows legacy source badges for rows with `created_via LIKE 'legacy_ctv_import%'`
  - Legacy CTV import dry-run reports planned/skipped counts and writes an audit before any confirmed DB write
  - commission-summary returns live aggregated numbers from both DB earnings tables for the CTV's recipient_partner_id
  - Referred clients show correct LOB tags and status
  - Refer-client sheet defaults the appointment date to today's Asia/Ho_Chi_Minh date and submits without a manual date tap
  - Refer-client and Recruit CTV sheets keep the close button visible in the sheet header while long form content scrolls internally; the refer-client calendar opens as a custom in-flow Monday-first picker on mobile and desktop with no native iOS calendar overlay, clipped panel, or field/button overlap.
  - Refer-client phone lookup pre-fills the name only for an existing available client, and never for a client actively claimed by another CTV
  - Public landing booking requires a valid active CTV phone and still blocks B_CLIENT_CLAIMED before creating the appointment
  - Public landing booking and CTV signup live-verify typed CTV phone numbers before submit; unknown CTV phones block before creating appointments or CTV partners
  - Public landing CTV signup works without a referral link when a valid active upline CTV phone is submitted, and also works as an active root/top-level CTV signup when no upline is supplied
  - Public landing CTV signup requires only name, phone, and password; email stays optional and a blank/omitted email must not block creation.
  - CTV Tôi tab saves display-name changes through PATCH /api/ctv/me, updates the visible greeting/profile name without reload, and rejects blank names
  - CTV Tôi tab changes passwords only after current-password verification, rejects short/mismatched new passwords client-side, and never exposes password hashes
  - POST /api/ctv/bookings resolves non-null appointment companyid, creates dbo.appointments without creating saleorders or saleorderlines, defaulting omitted service metadata to Referral Start when configured
  - POST /api/ctv/clients blocks re-registration when the same phone is actively claimed in the selected LOB by a different CTV; Dental and Cosmetic locks do not cross-block each other
  - Service-card CTV assignment creates full-service-price tier earnings immediately; service-card creation with a blank `ctv_id` stays CTV-less and creates NO earnings (DEC-20260610-01); service-card CTV reassignment before payout reverses/recreates pending earnings; paid-out earnings block reassignment
  - Appointment-card CTV reassignment changes ownership without commission movement and preserves the existing timer anchor
  - Admin CTV hierarchy tree blocks moving CTVs with any referred customer, service, or earning activity and logs allowed moves automatically
  - Staff /verify-discount blocks CTV login, requires LOB + phone, reclaims client under issuing CTV on verify
  - Admin Edit CTV modal toggles `is_live`; after save, the CTV's next QR code generation uses live tier settings
  - CTV portal QR tab shows live-tier preview when `isLive=true` (higher discount %, longer expiry)
  - NK3-only CTV integrity repair dry-run returns zero planned SQL after apply for Dental/Cosmetic CTV identity mirrors, active Cosmetic-only CTV dental-auth insertion, inactive Cosmetic-only scope normalization, and account `0972020908` CTV-only auth flags
  - Public fan landing `/ctv/discount/:shortCode` renders without admin Overview redirect; GET /api/discount-codes/landing/:shortCode works without auth token
  - CTV portal Mã QR link opens fan landing; after claim, voucher QR populates with staff-verify URL
  - CTV portal "Tạo mã & tải ảnh" POSTs a single-encoded JSON body and surfaces API failures via a visible alert (discountCodes.body.test.ts; qrDiscount.generateError)
  - Staff lookup/verify finds freshly generated codes (fetchCodeRow passes db handle — ctvDiscountCodes.fetchCodeRow.test.js); verify UPDATE keeps $9::varchar cast; markAsUsed falls back to the customer bound at check-in
  - Staff /verify-discount blocks CTV login, requires LOB + phone, reclaims client under issuing CTV on verify
risk_level: high (only cross-DB surface)
notes:
  - "D13 live demo: seed a CTV partner + referred patient + collected payment in dental and/or cosmetic; verify earnings row + CTV dashboard shows it."
  - "CTV v3 supersedes payment-collected/product-rate CTV behavior: service card created = CTV earns from full service price, tier config drives percentages. See docs/business-logic/ctv-referral-commission.md."
  - "per migration 047 + earnings-commissions.yaml: uses recipient_partner_id on earnings (not recipient_user_id); partners is identity."
  - "CTV aggregator in ctv.js must use getDb('dental') + getDb('cosmetic') explicitly; no getQuery since no LOB scope on the CTV request."
