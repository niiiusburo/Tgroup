name: Customers & Partners
summary: |
  Single-table inheritance on dbo.partners for customers and employees.
  Partners route handles CRUD, uniqueness checks, soft/hard delete, and KPIs.
  Customer data is consumed by the Customers page, selectors, appointments,
  payments, and face-recognition flows.
owns:
  - api/src/routes/partners.js
  - api/src/routes/customerBalance.js
  - api/src/routes/customerReceipts.js
  - api/src/routes/customerSources.js
  - api/src/routes/faceRecognition.js
  - api/src/services/faceDiagnostics.js
  - website/src/pages/Customers.tsx
  - website/src/components/forms/AddCustomerForm/
  - website/src/components/customer/
  - website/src/components/shared/CustomerSelector.tsx
  - website/src/lib/api/partners.ts
  - website/src/hooks/useCustomers.ts
  - website/src/hooks/useCustomerProfile.ts
reads:
  - api/src/db.js
  - dbo.investor_clients (investor allowlist for customer/profile reads)
writes:
  - dbo.partners (insert/update/soft-delete/hard-delete)
  - dbo.customersources (CRUD via customerSources route)
  - dbo.partners.face_registered_at / face_subject_id (face recognition)
  - api/uploads/face-diagnostics/ (hidden Face ID attempt diagnostics)
tables:
  - dbo.partners
  - dbo.customersources
  - dbo.customer_face_embeddings
  - dbo.appointments (read-only in KPIs)
  - dbo.saleorders (read-only in KPIs)
  - dbo.payments (read-only in balance)
  - dbo.dotkhams (read-only in receipts/profile)
  - dbo.investor_clients
endpoints:
  - GET    /api/Partners
  - GET    /api/Partners/check-unique
  - GET    /api/Partners/resolve
  - GET    /api/Partners/investor-visibility
  - GET    /api/Partners/:id
  - GET    /api/Partners/:id/GetKPIs
  - POST   /api/Partners
  - PUT    /api/Partners/:id
  - PATCH  /api/Partners/:id/investor-visibility
  - PATCH  /api/Partners/:id/soft-delete
  - DELETE /api/Partners/:id/hard-delete
  - GET    /api/CustomerBalance/:id
  - GET    /api/CustomerReceipts
  - GET    /api/CustomerSources
  - POST   /api/CustomerSources
  - PUT    /api/CustomerSources/:id
  - DELETE /api/CustomerSources/:id
  - GET    /api/DotKhams
  - GET    /api/DotKhams/:id
  - POST   /api/face/recognize
  - POST   /api/face/register
  - POST   /api/face/re-register
  - GET    /api/face/status/:partnerId
  - POST   /api/public/face/checkin
ui_surfaces:
  - /customers
  - /customers/:id
  - /checkin public Face ID kiosk
  - CustomerSelector dropdown (used in appointments, payments, services)
  - CustomerProfile tabs (appointments, services, photos, payments)
  - AddCustomerForm modal
ui_invariants:
  - Customer source (`sourceid` / `sourcename`, label `Nguồn khách hàng`) is stored for migration/reporting compatibility but must not appear in the customer profile assignment card or the customer profile add/edit form.
  - Customer list search must resolve customers by migrated customer ref, appointment number (`appointments.name`), and service/treatment order number (`saleorders.code` / `saleorders.name`).
  - Lightweight customer resolution uses `GET /api/Partners/resolve?key=` for UUID/ref/phone lookup and returns 404/409 payloads for no-match or ambiguous-match picker flows.
  - Customer-facing searches must be accent-insensitive for Vietnamese names so staff can type without diacritics.
  - Face registration for add/edit customer flows should collect straight, left, and right profile samples so recognition works when customers turn their head.
  - CompreFace status must verify actual provider examples; stale `face_subject_id` without CompreFace examples is not a registered face.
  - Public `/checkin` must expose camera flip and privacy-softened preview controls without returning or displaying customer identifiers beyond the allowed greeting.
  - Hidden Face ID diagnostics may record hashed candidate identifiers and score margins for tuning, but must not include names, phone numbers, customer codes, raw partner IDs, raw embeddings, raw images, or tokens.
  - Customer profile assignment card and edit form must display the sales employee from `partners.salestaffid` / `salestaffname`, not the customer's `jobtitle` or other personal-detail fields.
  - Customer edit forms must resolve saved employee assignment IDs against all employees, including inactive migrated employees; active-only lists are for new selection defaults, not selected-value hydration.
  - Employee assignment suggestions in customer forms must hide inactive employees so TDental duplicate staff records do not appear as selectable options.
  - Customer phone is not a durable unique identity. Phone may overlap another phone or match a customer code (`partners.ref`) and must not block customer create/edit saves.
  - Customer DOB date parts imported as blank or zero values must normalize to null on create/update; nonblank invalid day/month values still fail validation.
  - Investor employees must see only customers listed in `dbo.investor_clients`; list/profile/KPI/receipt/balance/service reads must return empty or 404 for non-allowlisted customer records.
  - Admin-class users may curate investor visibility from the `/customers` Investor checkbox; non-admin staff and investor users must not see that column.
jobs:
  - none (archive scripts in api/scripts/archive/ are stale)
shared_types:
  - website/src/types/customer.ts
  - website/src/lib/api/partners.ts (ApiPartner)
dependencies:
  - api/src/db.js
  - api/src/middleware/auth.js (permission checks)
  - dbo.companies (for companyid FK)
affected_by:
  - Changes to dbo.partners schema (NOT NULL constraints recently caused login breakage)
  - Changes to dbo.companies (location name display)
  - Permission string changes (customers.view, customers.add, customers.edit, customers.delete, customers.hard_delete)
  - Changes to dbo.investor_clients or `resolveInvestorScope()`
  - Changes to admin investor visibility endpoints or CustomerColumns investor checkbox behavior
impact_tests:
