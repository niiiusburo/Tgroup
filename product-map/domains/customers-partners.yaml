  - website/e2e/customer-profile-crud.spec.ts
  - website/e2e/customer-persistence-sweep.spec.ts
  - website/e2e/face-recognition related flows
  - api/src/services/__tests__/faceDiagnostics.test.js
  - api/src/routes/partners/__tests__/searchFilters.test.js
  - api/tests/investorIdorScoping.test.js
  - api/tests/investorScopeRoutePermissions.test.js
  - api/src/routes/partners/__tests__/investorVisibility.test.js
  - website/src/pages/Customers/CustomerColumns.test.tsx
  - website/src/__tests__/customer-deep-link.test.tsx
risk_level: high
