  - Any change to appointment status values
  - Any change to payment method enum
impact_tests:
  - website/src/pages/reports/__tests__/ReportsDashboard.test.tsx
  - website/src/pages/reports/__tests__/ReportsSubpages.test.tsx
  - api/src/services/exports/__tests__/reportSalesEmployeesExport.test.js
  - api/src/services/exports/__tests__/legacyFlatReportsExport.test.js
  - api/src/routes/reports/__tests__/cashFlow.test.js
  - api/src/routes/reports/__tests__/revenueRecognition.test.js
  - api/src/routes/reports/__tests__/servicesBreakdown.test.js
  - api/src/routes/reports/__tests__/doctorsPerformance.test.js
  - website/e2e/export-downloads.spec.ts
  - website/src/__tests__/useVersionCheck.test.ts (indirect)
risk_level: medium
notes:
  - "`/api/Exports` is operational export infrastructure, not the full reports module; it belongs here for audit/test ownership because it reads across reporting-style aggregates."
  - Export download audit logging is fire-and-forget after the XLSX response; preview audit logging is awaited but catch-and-log. Verification that an audit row exists requires a direct DB/API check.
  - Cash-flow reporting V1 separates service collections, customer deposits, refunds, deposit usage, and voided adjustments. Deposit usage is internal movement and must not be counted as new cash.
  - Revenue reporting must derive paid revenue from posted `payment_allocations` linked to saleorders plus direct posted `payment_category = 'payment'` receipts with no allocation rows yet, including imported cosmetic receipts whose `service_id` is still blank. By-location reporting must surface unassigned paid receipts instead of dropping them. By-source reporting uses `COALESCE(saleorders.sourceid, partners.sourceid)` and includes unassigned paid receipts. Deposits, refunds, deposit usage, and voided payments stay excluded. Unpaid `saleorders.amounttotal` remains invoiced/outstanding context, not paid revenue.
  - Report endpoints that expose branch-sensitive rows must use `api/src/services/locationScope.js` or an equivalent `resolveEffectivePermissions()` location-scope check. Plain Admin is branch-scoped; wildcard, Super Admin, or System Administrator can run all-location reports. `api/src/routes/reports/__tests__/cashFlow.test.js` includes parent-router coverage for `/api/Reports/locations/comparison` so locations comparison cannot regress to all-branch output.
  - >-
    Employee revenue Excel export uses `/api/Exports/report-sales-employees`
    with `reports.export`, date/location scope, employee type, and optional
    employee filters; workbook rows are grouped by employee and derive revenue
    from posted `payment_allocations`, excluding deposits, refunds, deposit
    usage, and voided payments like the revenue-flat export.
  - >-
    Legacy flat report exports use `/api/Exports/revenue-flat` and
    `/api/Exports/deposit-flat` with `payments.export`; preview/download
    behavior must stay aligned with the Revenue and Cash Flow report cards.
  - >-
    `/reports/revenue` "Tổng đã thu" must reconcile to the `Báo cáo doanh thu`
    Excel collected total (`Số tiền` / preview `Tổng tiền`) for the same date
    and branch filters; cash-flow cards remain raw cash-movement context and are
    not the paid-revenue source of truth.
  - Overview Zone 1 and Zone 3 searches must be accent-insensitive so unaccented input matches Vietnamese names and labels with diacritics.
  - Report date filters must use the shared in-flow DatePicker so mobile report controls do not invoke native date popups or overlap feedback helpers.
