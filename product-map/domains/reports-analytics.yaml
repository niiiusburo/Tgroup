name: Reports & Analytics
summary: |
  Dashboard KPIs and sub-reports (revenue, appointments, doctors, customers,
  locations, services, employees). Aggregates data from appointments, payments,
  saleorders, partners, and products.
owns:
  - api/src/routes/reports.js
  - api/src/routes/dashboardReports.js
  - api/src/routes/exports.js
  - api/src/services/exports/
  - website/src/pages/Reports.tsx
  - website/src/pages/reports/
  - website/src/components/reports/
  - website/src/components/shared/ExportMenu.tsx
  - website/src/components/shared/ExportPreviewModal.tsx
  - website/src/hooks/useReportData.ts
  - website/src/hooks/useDashboardStats.ts
  - website/src/hooks/useOverviewData.ts
  - website/src/hooks/useExport.ts
reads:
  - api/src/db.js
writes:
  - dbo.exports_audit (preview/download audit rows only)
tables:
  - dbo.appointments
  - dbo.payments
  - dbo.saleorders
  - dbo.saleorderlines
  - dbo.partners
  - dbo.products
  - dbo.productcategories
  - dbo.companies
  - dbo.customersources
  - dbo.monthlyplans
  - dbo.planinstallments
  - dbo.exports_audit
endpoints:
  - POST /api/Reports/dashboard
  - POST /api/Reports/revenue/summary
  - POST /api/Reports/revenue/trend
  - POST /api/Reports/revenue/by-location
  - POST /api/Reports/revenue/by-doctor
  - POST /api/Reports/revenue/by-category
  - POST /api/Reports/revenue/payment-plans
  - POST /api/Reports/revenue/rules
  - POST /api/Reports/cash-flow/summary
  - POST /api/Reports/appointments/summary
  - POST /api/Reports/appointments/trend
  - POST /api/Reports/doctors/performance
  - POST /api/Reports/customers/summary
  - POST /api/Reports/employees/overview
  - POST /api/Reports/services/breakdown
  - POST /api/Reports/locations/comparison
  - POST /api/DashboardReports/GetSumary
  - GET  /api/Exports/types
  - POST /api/Exports/:type/preview
  - POST /api/Exports/:type/download
ui_surfaces:
  - /reports
  - /reports/dashboard
  - /reports/revenue
  - /reports/appointments
  - /reports/doctors
  - /reports/customers
  - /reports/locations
  - /reports/services
  - /reports/employees
  - Employee revenue Excel export controls on /reports/revenue
  - Export menus on /customers, /calendar, /services, /payment, and /service-catalog
  - Overview page (TodaySchedule, RevenueChartModule, StatCardModule)
jobs:
  - none
shared_types:
  - website/src/types/common.ts (RevenueDataPoint)
  - website/src/hooks/useReportData.ts (return shapes)
dependencies:
  - Appointments & Calendar
  - Payments & Deposits
  - Services Catalog
  - Customers & Partners
  - Employees & HR
affected_by:
  - Any schema change to aggregated tables
  - Any change to appointment status values
  - Any change to payment method enum
impact_tests:
  - website/src/pages/reports/__tests__/ReportsDashboard.test.tsx
  - website/src/pages/reports/__tests__/ReportsSubpages.test.tsx
  - api/src/services/exports/__tests__/reportSalesEmployeesExport.test.js
  - api/src/routes/reports/__tests__/cashFlow.test.js
  - api/src/routes/reports/__tests__/revenueRecognition.test.js
  - api/src/routes/reports/__tests__/servicesBreakdown.test.js
  - website/e2e/export-downloads.spec.ts
  - website/src/__tests__/useVersionCheck.test.ts (indirect)
risk_level: medium
notes:
  - "`/api/Exports` is operational export infrastructure, not the full reports module; it belongs here for audit/test ownership because it reads across reporting-style aggregates."
  - Export download audit logging is fire-and-forget after the XLSX response; preview audit logging is awaited but catch-and-log. Verification that an audit row exists requires a direct DB/API check.
  - Cash-flow reporting V1 separates service collections, customer deposits, refunds, deposit usage, and voided adjustments. Deposit usage is internal movement and must not be counted as new cash.
  - Revenue reporting must derive paid revenue from posted `payment_allocations` linked to saleorders, excluding deposits, refunds, deposit usage, and voided payments. Unpaid `saleorders.amounttotal` remains invoiced/outstanding context, not paid revenue.
  - Revenue and cash-flow report endpoints enforce employee location scope from primary branch plus `employee_location_scope`; remaining non-revenue report routes should be reviewed before exposing them to scoped managers.
  - Employee revenue Excel export uses `/api/Exports/report-sales-employees` with `reports.export`, date/location scope, employee type, and optional employee filters; workbook rows are grouped by employee and derive revenue from posted `payment_allocations`.
  - Overview Zone 1 and Zone 3 searches must be accent-insensitive so unaccented input matches Vietnamese names and labels with diacritics.
