notes:
  - "`/api/Exports` is operational export infrastructure, not the full reports module; it belongs here for audit/test ownership because it reads across reporting-style aggregates."
  - Export download audit logging is fire-and-forget after the XLSX response; preview audit logging is awaited but catch-and-log. Verification that an audit row exists requires a direct DB/API check.
  - Cash-flow reporting V1 separates service collections, customer deposits, refunds, deposit usage, and voided adjustments. Deposit usage is internal movement and must not be counted as new cash.
  - Revenue reporting must derive paid revenue from posted `payment_allocations` linked to saleorders, excluding deposits, refunds, deposit usage, and voided payments. Unpaid `saleorders.amounttotal` remains invoiced/outstanding context, not paid revenue.
  - Revenue by source uses sale-order source first, customer source fallback, and includes direct posted service payments without allocation rows.
  - All `/api/Reports` endpoints enforce employee location scope from primary branch plus `employee_location_scope`; empty `companyId` means all allowed employee branches, explicit unauthorized branch requests return 403, Admin/Super Admin/wildcard callers can intentionally run all-location reports, and investor callers still compose branch filters with `dbo.investor_clients`.
  - Operational Excel export builders for customers, appointments, payments, services, service catalog, employee-sales, revenue-flat, and deposit-flat use backend export scope before preview and download row queries; omitted/all branch filters narrow to allowed employee locations, explicit unauthorized branches return 403, and customer-linked builders compose with `dbo.investor_clients`.
  - >-
    Employee revenue Excel export uses `/api/Exports/report-sales-employees`
    with `reports.export`, date/location scope, employee type, and optional
    employee filters; workbook rows are grouped by employee and derive revenue
    from posted `payment_allocations`, excluding deposits, refunds, deposit
    usage, and voided payments like the revenue-flat export.
  - >-
    Legacy flat report exports use `/api/Exports/revenue-flat` and
    `/api/Exports/deposit-flat` with `payments.export`; preview/download
    behavior must stay aligned with the Revenue and Cash Flow report cards.
  - >-
    `/reports/revenue` "Tổng đã thu" must reconcile to the `Báo cáo doanh thu`
    Excel collected total (`Số tiền` / preview `Tổng tiền`) for the same date
    and branch filters; cash-flow cards remain raw cash-movement context and are
    not the paid-revenue source of truth.
  - Overview Zone 1 and Zone 3 searches must be accent-insensitive so unaccented input matches Vietnamese names and labels with diacritics.
  - Investor employees must receive report/dashboard aggregates and customer-linked Excel rows filtered to `dbo.investor_clients`. Normal staff/admin report formulas must remain unchanged, including canonical posted-revenue calculations.
