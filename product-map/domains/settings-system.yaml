name: Settings & System Config
summary: |
  Application-wide settings including system preferences, timezone config,
  IP access control whitelist, customer sources, and bank/VietQR settings.
  Some settings are stored in DB; others are env-driven.
owns:
  - api/src/routes/systemPreferences.js
  - api/src/routes/bankSettings.js
  - api/src/routes/customerSources.js
  - api/src/routes/config.js
  - api/src/routes/places.js
  - api/src/routes/telemetry.js
  - api/src/routes/ipAccess.js
  - api/src/routes/stockPickings.js (inventory route currently permissioned through settings.edit for mutations)
  - website/src/pages/Settings/index.tsx
  - website/src/components/settings/
  - website/src/hooks/useSettings.ts
  - website/src/hooks/useBankSettings.ts
  - website/src/hooks/useIpAccessControl.ts
  - website/src/lib/api/systemPreferences.ts
  - website/src/lib/api/customerSources.ts
  - website/src/lib/api/ipAccess.ts
reads:
  - api/src/db.js
  - process.env.GOOGLE_PLACES_API_KEY
writes:
  - dbo.systempreferences
  - dbo.company_bank_settings
  - dbo.customersources
  - dbo.ip_access_settings
  - dbo.ip_access_entries
tables:
  - dbo.systempreferences
  - dbo.company_bank_settings
  - dbo.customersources
  - dbo.ip_access_settings
  - dbo.ip_access_entries
  - dbo.error_events
  - dbo.error_fix_attempts
  - dbo.version_events
endpoints:
  - GET    /api/SystemPreferences
  - GET    /api/SystemPreferences/:key
  - POST   /api/SystemPreferences
  - PUT    /api/SystemPreferences/:key
  - DELETE /api/SystemPreferences/:key
  - POST   /api/SystemPreferences/bulk
  - GET    /api/settings/bank
  - PUT    /api/settings/bank
  - GET    /api/CustomerSources
  - GET    /api/CustomerSources/:id
  - POST   /api/CustomerSources
  - PUT    /api/CustomerSources/:id
  - DELETE /api/CustomerSources/:id
  - GET    /api/StockPickings
  - GET    /api/StockPickings/:id
  - POST   /api/StockPickings
  - PUT    /api/StockPickings/:id
  - DELETE /api/StockPickings/:id
  - GET    /api/IpAccess/settings
  - PUT    /api/IpAccess/settings
  - GET    /api/IpAccess/entries
  - POST   /api/IpAccess/entries
  - PUT    /api/IpAccess/entries/:id
  - DELETE /api/IpAccess/entries/:id
  - GET    /api/IpAccess/check
  - GET    /api/IrConfigParameters/GetParam
  - POST   /api/IrConfigParameters/GetParam
  - GET    /api/Places/autocomplete
  - GET    /api/Places/details
  - POST   /api/telemetry/errors
  - GET    /api/telemetry/errors
  - PUT    /api/telemetry/errors/:id
  - POST   /api/telemetry/errors/:id/fix-attempts
  - GET    /api/telemetry/stats
  - POST   /api/telemetry/version
ui_surfaces:
  - /settings
  - SystemPreferencesContent
  - BankSettingsForm
  - TimezoneSelector
  - IpAccessControl
  - CustomerSourcesConfig
  - PermissionGroupConfig / RoleConfig
  - ErrorBoundary / ErrorReporter
  - Version update prompt
jobs:
  - none
shared_types:
  - website/src/types/settings.ts
  - website/src/types/ipAccessControl.ts
dependencies:
  - Auth & Permissions (settings.view, settings.edit)
  - Google Places API (env key)
affected_by:
  - Changes to dbo.systempreferences schema
  - Changes to dbo.ip_access_settings or dbo.ip_access_entries mode/entry semantics
  - Changes to GOOGLE_PLACES_API_KEY env var
  - Changes to IP whitelist logic in useIpAccessControl
impact_tests:
  - website/e2e/login-and-settings.spec.ts
  - website/src/__tests__/useVersionCheck.test.ts
  - website/src/__tests__/timezone.*.test.ts
  - api/tests/telemetry.test.js
  - api/tests/telemetryAuth.test.js
risk_level: medium
notes:
  - "`POST /api/telemetry/errors` is intentionally public and rate-limited before the global `/api` auth middleware; telemetry reads, writes, stats, fix-attempts, and version events are authenticated by the global middleware."
  - "`GET /api/CustomerSources*` and `GET /api/StockPickings*` are authenticated only by the global `/api` auth middleware; their create/update/delete routes require `settings.edit`."
  - "`GET /api/IpAccess/check` is public via the server allowlist; settings and entries reads require `settings.view`, while mode/entry mutations require `settings.edit`."
