name: Earnings & Commissions Engine (v2) — Transactional Attribution (D13)
summary: |
  Append-only transactional earnings table (dbo.earnings) in BOTH databases.
  Separate from legacy commission *rules* system (commissions, commissionproductrules, saleorderlinepartnercommissions tables — untouched by v2; see legacy in business-logic/commission-rules.md).
  CTV v3 authority lives in docs/business-logic/ctv-referral-commission.md. For CTV, earnings are triggered ONLY when a service card with an explicitly selected CTV is created (DEC-20260610-01 strict attribution; the old create-time inheritance of the customer's recorded referrer is removed), based on the full service price, and tier percentages come from CTV admin tier config.
  Older payment-collected + product commission_rate_percent behavior is an implementation gap for CTV, not the target rule.
  Refunds, voids, deletes, and safe service reversals create negative reversal rows (original untouched) while earnings remain unpaid/pending.
  Paid-out earnings (status=paid or payout_id set) lock client-side payment/service reversal.
  CTV recipient resolution is the CTV explicitly selected on the service card — nothing else (DEC-20260610-01). A service created with no CTV selected stays CTV-less and produces zero commission, even when the customer has an active `referred_by_ctv_id`. Disabled/missing uplines earn nothing; company keeps those percentages.
  Product/service commission_rate_percent is legacy mock data and must not drive CTV earnings.
  Current partial implementation can still write earnings via payment collection and D13 recipient fallback; that path is superseded for CTV but remains documented until fully migrated.
  Payouts table for admin batch runs (earnings.payout_id link); admin-only via earnings.payout.run or commissions.* perms. Combined Dental+Cosmetic payouts use LOB-local payout rows linked by shared payout_group_id and receipt URL.
  consultations table cosmetic-only, invisible to admin UI, auto-managed by appointment handlers, 6mo TTL.
  Engine: api/src/services/commissionEngine.js (createEarningsForPayment, reverseOnRefund) and api/src/services/serviceReversal.js for saleorderline reversal guards.
  All earnings writes respect the correct DB via txClient from getDb or request-scoped.
owns:
  - api/src/services/commissionEngine.js (legacy/partial CTV engine behavior; must move CTV creation to service-card-created full-price tier logic)
  - api/src/routes/payments.js + saleorder close / refund paths (refund/reversal guards; payment-collected CTV creation is superseded)
  - api/src/services/serviceReversal.js + api/src/routes/saleOrderLines.js (safe service-line reversal, paid-out guard)
  - api/src/routes/cosmetic/appointments.js (auto create/supersede consultation card on book)
  - api/src/routes/payments/readHandlers.js (earnings-aware reports if any)
  - Future: admin payout runner (POST /api/payouts or /Earnings/payout)
reads:
  - tdental_demo.dbo.earnings
  - tcosmetic_demo.dbo.earnings
  - tdental_demo.dbo.payouts
  - tcosmetic_demo.dbo.payouts
  - tcosmetic_demo.dbo.consultations
  - tdental_demo.dbo.partners (salestaffid, referred_by_ctv_id, for D13)
  - tcosmetic_demo.dbo.partners (referred_by_ctv_id, consulting_staff_id on related)
  - CTV admin tier config (levels 0-4, enabled/disabled, normal percentages, future Braces percentages)
  - tdental_demo.dbo.products (legacy + commission_rate_percent; Braces override detection by category/name planned)
  - tcosmetic_demo.dbo.products (legacy + commission_rate_percent)
  - (legacy commissions tables untouched for rules only)
writes:
  - Both DBs: dbo.earnings (append only; never UPDATE existing earnings rows)
  - Both DBs: dbo.payouts
  - tcosmetic_demo.dbo.consultations (auto create/supersede)
  - tdental_demo.dbo.partners (referred_by_ctv_id additive only)
  - tdental_demo.dbo.products (legacy commission_rate_percent additive; not CTV source of truth)
  - tcosmetic_demo.dbo.products (same)
tables:
  # NEW transactional earnings (both DBs) — per migration 047
  - tdental_demo.dbo.earnings (append-only; client_id → partners, recipient_partner_id → partners, payment_id, service_line_id, source ('ctv'|'consultation'|'salestaff'), amount NUMERIC(14,2) negative for reversals, status ('pending'|'paid'|'reversed'), payout_id, earned_at)
  - tcosmetic_demo.dbo.earnings (identical shape)
  - tdental_demo.dbo.payouts (batch header; cycle_label, paid_at, total_amount, notes, created_by_partner_id, created_at)
  - tcosmetic_demo.dbo.payouts (identical)
  # Cosmetic attribution (invisible)
  - tcosmetic_demo.dbo.consultations (id, client_id→partners, consulting_staff_id→partners, opened_at, expires_at, status, superseded_by, notes; 6mo TTL from last activity)
  # Additive dental (and cosmetic for consistency)
  - tdental_demo.dbo.partners (+ referred_by_ctv_id UUID NULL)
  - tdental_demo.dbo.products (+ commission_rate_percent NUMERIC(5,2) NULL DEFAULT 0)
  - tcosmetic_demo.dbo.products (+ commission_rate_percent)
  # Legacy (untouched by engine; rules/config only)
  - tdental_demo.dbo.commissions (legacy rules tables)
  - tdental_demo.dbo.commissionproductrules
  - etc.
endpoints:
  - Current partial implementation: earnings writes via payments path
  - Target CTV implementation: earnings writes when a service card with an explicitly selected CTV is created or reassigned before payout (DEC-20260610-01: no inherited referrer)
  - GET /api/Earnings or reports (admin earnings view reads earning rows, including service_line_id for service drilldowns)
  - POST /api/Payouts (batch payout)
ui_surfaces:
  - CTV dashboard (reads only)
  - /commission?tab=earnings and /commission?tab=payouts admin views; earning and pending-payout service links open /customers/:id?tab=records&serviceLineId=:lineId&from=commission for audit context before staff pay out
jobs:
  - Target CTV engine: service-card create/reassign/cancel/delete/refund creates positive/reversal CTV earnings based on full service price and tier config
  - NK3-only integrity repair: backfill only valid paymentless service-card CTV earning gaps after fresh backups; soft-cancel invalid service-card gaps with missing customer/product references; repair orphan paid earnings by returning them to pending without deleting history
  - Current partial commissionEngine: payment collect/refund
  - auto-consultation lifecycle on cosmetic appt
shared_types:
  - api/src/services/commissionEngine (D13 types, EarningsRow)
  - contracts for payout/earnings if exposed
dependencies:
  - Service cards / SaleOrderLines (target CTV trigger on service-card create with explicitly selected CTV only, plus reassignment)
  - Payments / Deposits (reversal and paid-out guard surfaces; current partial trigger on collect is superseded for CTV)
  - Cosmetic Clients / Partners (D13 inputs: referred_by, salestaffid, consulting_staff)
  - CTV tier config (rate source)
  - Products / Services (full service price; Dental-only Braces/Orthodontics override detection planned)
  - CTV (reads the output)
affected_by:
  - Any change to payments collect flow or refund
  - Any service-line delete/reversal path that touches payment_allocations or saleorder residuals
  - partners columns for attribution
  - consultation card logic
impact_tests:
  - Service-card creation in dental or cosmetic with selected CTV creates CTV earnings from full service price and configured enabled tier levels
  - Service-card creation without a selected CTV creates NO CTV earnings and leaves saleorders.ctv_id NULL — regardless of the customer's recorded referrer (DEC-20260610-01); nightly guard scripts/nk3-commission-audit.sh enforces the invariant and alerts Telegram
  - Refund/void/delete/safe service reversal creates negative reversal row; original earnings row remains for history
  - Paid-out earnings block payment void/delete and service reversal
  - Service-card CTV reassignment before payout reverses old pending earnings and creates new pending earnings for the new CTV/uplines
  - Combined Dental+Cosmetic payout stores one row per LOB linked by shared payout_group_id and shared receipt URL
  - Payment collect in dental or cosmetic creates exactly one earnings row per D13 (or none)
  - D13 priority verified in unit tests (ctv > consultation > salestaff)
  - Legacy commission rules tables never written by v2 engine
  - Admin earnings/payout rows with service_line_id link to the matching customer Records tab and focus the service row without mutating earnings or payout state
  - NK3-only integrity repair planner classifies invalid service-card gaps as soft-cancel, valid gaps as full-price CTV earning backfill, and orphan paid earnings with missing payout rows as pending/no-payout repair
risk_level: high (money movement)
notes:
  - "EARNINGS vs LEGACY COMMISSIONS: earnings is the transactional append-only attribution log. Legacy commissions/* are the old rules/config tables and product commission_rate_percent is legacy mock data for CTV. See product-map/business-logic/commission-rules.md, docs/business-logic/ctv-referral-commission.md, and DECISIONS.md."
  - "D13 implemented exactly as migration comment + engine: recipient_partner_id always references a row in the local DB's partners table (or soft-validated cross for CTV)."
  - "All earnings writes must be inside the payment txClient from the correct getDb(lob)."
  - "Service reversal may auto-void a linked payment only for a single-line order whose payment is allocated solely to that order; otherwise staff must resolve the payment first."
  - "Per 047: earnings chosen over 'commissions' to avoid collision with legacy."
