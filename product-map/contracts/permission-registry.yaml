# Additional frontend permissions not in ROUTE_PERMISSIONS but checked inline
frontend_inline_permissions:
  - string: appointments.view
    note: Implied by calendar.view/nav appointments entry; backend GET /api/Appointments is now guarded
  - string: locations.edit
    components:
      - components/settings/RoleConfig.tsx (inferred from grep)
    note: Not present in backend requirePermission list
  - string: external_checkups.view
    components:
      - pages/Customers.tsx (conditionally renders HealthCheckupGallery)
  - string: external_checkups.create
    components:
      - components/customer/HealthCheckupGallery.tsx (create external patient button)
  - string: external_checkups.upload
    components:
      - components/customer/HealthCheckupGallery.tsx (upload checkup button and form)
  - string: customers.view_all
    components:
      - components/shared/CustomerSelector.tsx or related customer list filters
    note: Grep shows usage but source not fully traced
  - string: customers.edit
    components:
      - pages/Customers.tsx (edit button guard)
  - string: customers.add
    components:
      - pages/Customers.tsx (add button guard)
  - string: customers.delete
    components:
      - pages/Customers.tsx (delete action guard)
  - string: customers.hard_delete
    components:
      - pages/Customers.tsx (hard delete guard)

# Authenticated/public backend routes without route-level requirePermission().
backend_auth_only_routes:
  - routes:
      - GET /api/DotKhams
      - GET /api/DotKhams/:id
      - GET /api/SaleOrderLines
      - GET /api/CustomerSources
      - GET /api/CustomerSources/:id
      - GET /api/StockPickings
      - GET /api/StockPickings/:id
      - GET /api/ProductCategories
    enforcement: Global /api requireAuth only.
  - routes:
      - GET /api/IpAccess/check
    enforcement: Public allowlist before global /api auth.

