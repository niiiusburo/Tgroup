# Gaps / risks
risks:
  - desc: "locations.edit is checked in frontend but no backend requirePermission('locations.edit') exists"
    severity: low
  - desc: "Frontend /services is guarded by customers.edit while backend sale-order service reads use services.view; /service-catalog is guarded by services.view"
    severity: medium
  - desc: "No central enum means typos in any string cause silent failures or 403s"
    severity: high
  - desc: "Wildcard * bypasses all checks but is not documented for admins"
    severity: low

# Cosmetic LOB v2 reality note (post 047 sync)
# - Table for transactional attribution: dbo.earnings (both DBs); legacy rules tables remain named commissions/*
# - Permission strings keep "commissions.*" and "ctv.*" for UI/UX continuity (see earnings-commissions.yaml)
# - New keys registered: cosmetic.access, dental.access, ctv.*, lob.crossview, commissions.*
# - All cosmetic/* routes also enforce requireLobScope + requirePermission('cosmetic.access')
# - partners table (not users) carries is_ctv / lob_scope for all permission + LOB decisions
