# TGroup Permission Registry
# Canonical mapping of all permission strings to backend routes, frontend routes, and UI components.

meta:
  total_backend_strings: 43
  total_frontend_route_guards: 15
  total_nav_guards: 13
  wildcard: "*"
  wildcard_meaning: "Grants all permissions (used in auth middleware and hasPermission)"

# Backend permission strings enforced by route-level permission middleware
backend_permissions:
  - string: appointments.view
    routes:
      - GET /api/Appointments
      - GET /api/Appointments/:id
  - string: appointments.add
    routes:
      - POST /api/Appointments
  - string: appointments.export
    routes:
      - POST /api/Exports/appointments/preview
      - POST /api/Exports/appointments/download
  - string: appointments.edit
    routes:
      - PUT /api/Appointments/:id
  - string: customers.export
    routes:
      - POST /api/Exports/customers/preview
      - POST /api/Exports/customers/download
  - string: customers.add
    routes:
      - POST /api/Partners
  - string: customers.delete
    routes:
      - PATCH /api/Partners/:id/soft-delete
  - string: customers.edit
    routes:
      - PUT /api/Partners/:id
      - POST /api/SaleOrders
      - PATCH /api/SaleOrders/:id
      - PATCH /api/SaleOrders/:id/state
      - DELETE /api/SaleOrderLines/:id
  - string: customers.hard_delete
    routes:
      - DELETE /api/Partners/:id/hard-delete
  - string: customers.view
    routes:
      - GET /api/Partners
      - GET /api/Partners/check-unique
      - GET /api/Partners/resolve
      - GET /api/Partners/:id
      - GET /api/Partners/:id/GetKPIs
      - GET /api/CustomerReceipts
      - GET /api/CustomerReceipts/:id
  - string: employees.view
    routes:
      - GET /api/Employees
      - GET /api/Employees/:id
  - string: employees.edit
    routes:
      - POST /api/Employees
      - PUT /api/Employees/:id
      - DELETE /api/Employees/:id
  - string: external_checkups.create
    routes:
      - POST /api/ExternalCheckups/:customerCode/patient
  - string: external_checkups.upload
    routes:
      - POST /api/ExternalCheckups/:customerCode/health-checkups
  - string: external_checkups.view
    routes:
      - GET /api/ExternalCheckups/images/:imageName
      - GET /api/ExternalCheckups/:customerCode
  - string: payment.edit
    routes:
      - PUT /api/settings/bank
      - PUT /api/MonthlyPlans/:id
      - PUT /api/MonthlyPlans/:id/installments/:installmentId/pay
      - POST /api/MonthlyPlans
      - DELETE /api/MonthlyPlans/:id
  - string: payment.add
    routes:
      - POST /api/Payments
      - PATCH /api/Payments/:id
      - POST /api/Payments/:id/proof
  - string: payment.refund
    routes:
      - POST /api/Payments/refund
  - string: payment.void
    routes:
      - DELETE /api/Payments/:id
      - POST /api/Payments/:id/void
  - string: payment.view
    routes:
      - GET /api/Payments
      - GET /api/Payments/deposits
      - GET /api/Payments/deposit-usage
      - GET /api/Payments/:id
      - GET /api/AccountPayments
      - GET /api/AccountPayments/:id
      - GET /api/MonthlyPlans
      - GET /api/MonthlyPlans/:id
  - string: payments.export
    routes:
      - POST /api/Exports/payments/preview
      - POST /api/Exports/payments/download
      - POST /api/Exports/revenue-flat/preview
      - POST /api/Exports/revenue-flat/download
      - POST /api/Exports/deposit-flat/preview
      - POST /api/Exports/deposit-flat/download
  - string: permissions.edit
    routes:
      - POST /api/Permissions/groups
      - PUT /api/Permissions/groups/:groupId
      - PUT /api/Permissions/employees/:employeeId
  - string: permissions.view
    routes:
      - GET /api/Permissions/groups
      - GET /api/Permissions/employees
      - GET /api/Permissions/resolve/:employeeId
      - GET /api/Feedback/all
      - GET /api/Feedback/all/:threadId
      - POST /api/Feedback/all/:threadId/reply
      - PATCH /api/Feedback/all/:threadId/status
      - DELETE /api/Feedback/all/:threadId
    note: Feedback admin routes use requireAdmin, which allows System Administrator or effective permissions.view.
  - string: reports.view
    routes:
      - POST /api/Reports/*
      - POST /api/DashboardReports/GetSumary
  - string: reports.export
    routes:
      - POST /api/Exports/report-sales-employees/preview
      - POST /api/Exports/report-sales-employees/download
  - string: locations.view
    routes:
      - GET /api/Companies
  - string: services.edit
    routes:
      - POST /api/Products
      - PUT /api/Products/:id
      - DELETE /api/Products/:id
      - POST /api/ProductCategories
      - PUT /api/ProductCategories/:id
      - DELETE /api/ProductCategories/:id
  - string: services.view
    routes:
      - GET /api/Products
      - GET /api/Products/:id
      - GET /api/SaleOrders
      - GET /api/SaleOrders/lines
      - GET /api/SaleOrders/:id
  - string: products.export
    routes:
      - POST /api/Exports/service-catalog/preview
      - POST /api/Exports/service-catalog/download
  - string: services.export
    routes:
      - POST /api/Exports/services/preview
      - POST /api/Exports/services/download
  - string: settings.edit
    routes:
      - POST /api/CustomerSources
      - PUT /api/CustomerSources/:id
      - DELETE /api/CustomerSources/:id
      - POST /api/SystemPreferences
      - PUT /api/SystemPreferences/:key
      - DELETE /api/SystemPreferences/:key
      - POST /api/SystemPreferences/bulk
      - POST /api/StockPickings
      - PUT /api/StockPickings/:id
      - DELETE /api/StockPickings/:id
      - PUT /api/IpAccess/settings
      - POST /api/IpAccess/entries
      - PUT /api/IpAccess/entries/:id
      - DELETE /api/IpAccess/entries/:id
  - string: settings.view
    routes:
      - GET /api/SystemPreferences
      - GET /api/SystemPreferences/:key
      - GET /api/settings/bank
      - GET /api/IpAccess/settings
      - GET /api/IpAccess/entries
  - string: website.edit
    routes:
      - POST /api/WebsitePages
      - PUT /api/WebsitePages/:id
      - DELETE /api/WebsitePages/:id
  - string: website.view
    routes:
      - GET /api/WebsitePages
      - GET /api/WebsitePages/:id

  # Cosmetic LOB v2 (per 2026-05-18-cosmetic-line-of-business-design-v2.md)
  - string: cosmetic.access
    routes:
      - GET,POST,PUT,PATCH,DELETE /api/cosmetic/*
    note: Hard LOB gate is also enforced by requireLobScope('cosmetic') middleware; this permission is the soft within-scope gate for cosmetic staff and admins.
  - string: dental.access
    routes:
      - All existing /api/dental/* and legacy routes when LOB=dental
    note: Backfilled for all existing users; admins + dental staff receive it.
  - string: ctv.dashboard.view
    routes:
      - GET /api/ctv/*
    note: CTV-flagged users only. Combined with is_ctv flag on users; CTV users never receive admin LOB scopes.
  - string: ctv.commission.view.self
    routes:
      - GET /api/ctv/commission-summary
    note: Self-only view of own pending/paid commissions aggregated across both DBs.
  - string: ctv.referrals.view.self
    routes:
      - GET /api/ctv/referrals
    note: Self-only list of referred clients (with LOB pills and earnings).
  - string: commissions.view.team
    routes:
      - GET /api/commissions/team
      - Reports commission rollups
    note: For admins and managers to view team (not just self) commissions.
  - string: commissions.payout.run
    routes:
      - POST /api/commissions/payout
    note: Admin-only action to close a payout cycle and mark commissions paid.
  - string: commissions.export
    routes:
      - POST /api/Exports/commissions/*
    note: Export of commission ledgers (admin + manager).
  - string: lob.crossview
    routes:
      - GET /api/*cross-lob-probe (internal for customer profile badge)
    note: Admin-only. Powers the "also a dental client" / "also a cosmetic client" badge on the opposite LOB profile. Performs soft phone match only.

