  # Cosmetic LOB v2 frontend guards (header toggle + CTV surface)
  - string: dental.access
    paths:
      - / (when BusinessUnitContext = dental)
  - string: cosmetic.access
    paths:
      - / (when BusinessUnitContext = cosmetic)
  - string: ctv.dashboard.view
