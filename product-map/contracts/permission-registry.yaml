# Additional frontend permissions not in ROUTE_PERMISSIONS but checked inline
frontend_inline_permissions:
  - string: appointments.view
    note: Implied by calendar.view/nav appointments entry; backend GET /api/Appointments is now guarded
  - string: locations.edit
    components:
      - components/settings/RoleConfig.tsx (inferred from grep)
    note: Not present in backend requirePermission list
  - string: external_checkups.view
    components:
      - pages/Customers.tsx (conditionally renders HealthCheckupGallery)
  - string: customers.view_all
    components:
      - components/shared/CustomerSelector.tsx or related customer list filters
    note: Grep shows usage but source not fully traced
  - string: customers.edit
    components:
      - pages/Customers.tsx (edit button guard)
  - string: customers.add
    components:
      - pages/Customers.tsx (add button guard)
  - string: customers.delete
    components:
      - pages/Customers.tsx (delete action guard)
  - string: customers.hard_delete
    components:
      - pages/Customers.tsx (hard delete guard)

# Nav sidebar permission mapping (Layout.tsx NAV_PERMISSION)
nav_permissions:
  - path: /
    permission: overview.view
  - path: /calendar
    permission: calendar.view
  - path: /customers
    permission: customers.view
  - path: /appointments
    permission: appointments.view
  - path: /website
    permission: website.view
  - path: /payment
    permission: payment.view
  - path: /employees
    permission: employees.view
  - path: /locations
    permission: locations.view
  - path: /reports
    permission: reports.view
  - path: /commission
    permission: commission.view
  - path: /settings
    permission: settings.view
  - path: /notifications
    permission: notifications.view
  - path: /permissions
    permission: permissions.view
  - path: /feedback
    permission: permissions.view
  - path: /relationships
    permission: permissions.view
  - path: /clinic
    permission: ""  # container, no guard
  - path: /team
    permission: ""  # container, no guard
  - path: /admin
    permission: ""  # container, no guard

# Gaps / risks
risks:
  - desc: "locations.edit is checked in frontend but no backend requirePermission('locations.edit') exists"
    severity: low
  - desc: "Frontend /services and /service-catalog route guards currently use customers.edit while backend service reads now use services.view"
    severity: medium
  - desc: "No central enum means typos in any string cause silent failures or 403s"
    severity: high
  - desc: "Wildcard * bypasses all checks but is not documented for admins"
    severity: low
