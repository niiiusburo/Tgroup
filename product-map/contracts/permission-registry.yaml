      - GET /api/Payments/deposits
      - GET /api/Payments/deposit-usage
      - GET /api/Payments/:id
      - GET /api/AccountPayments
      - GET /api/AccountPayments/:id
      - GET /api/MonthlyPlans
      - GET /api/MonthlyPlans/:id
  - string: payments.export
    routes:
      - POST /api/Exports/payments/preview
      - POST /api/Exports/payments/download
  - string: permissions.edit
    routes:
      - POST /api/Permissions/groups
      - PUT /api/Permissions/groups/:groupId
      - PUT /api/Permissions/employees/:employeeId
  - string: permissions.view
    routes:
      - GET /api/Permissions/groups
      - GET /api/Permissions/employees
      - GET /api/Permissions/resolve/:employeeId
  - string: reports.view
    routes:
      - POST /api/Reports/*
      - POST /api/DashboardReports/GetSumary
  - string: locations.view
    routes:
