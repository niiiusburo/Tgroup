# ctv.thammyvientam.com landing + NK3 forward
#
# Goal:
# - Keep the public landing page at https://ctv.thammyvientam.com/
# - Serve the landing page and /static/ assets from nginx, not the old app
# - Forward every other path to NK3 at https://tmv.2checkin.com

server {
    listen 80;
    listen [::]:80;
    server_name ctv.thammyvientam.com;

    root /var/www/ctv-thammyvientam-landing;
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = / {
        return 301 https://ctv.thammyvientam.com/;
    }

    location = /index.html {
        return 301 https://ctv.thammyvientam.com/;
    }

    location ^~ /static/ {
        return 301 https://ctv.thammyvientam.com$request_uri;
    }

    location / {
        return 301 https://tmv.2checkin.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ctv.thammyvientam.com;

    root /var/www/ctv-thammyvientam-landing;

    ssl_certificate /etc/letsencrypt/live/ctv.thammyvientam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctv.thammyvientam.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 https://ctv.thammyvientam.com/;
    }

    location ^~ /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location / {
        return 301 https://tmv.2checkin.com$request_uri;
    }
}
