# ctv.2checkin.com — repointed to NK3 cosmetic/CTV project (web container :5375).
# Dedicated vhost, split out of ctv-canonical.conf so ctv.thammyvientam.com is untouched.
server {
    if ($host = ctv.2checkin.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ctv.2checkin.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }


}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ctv.2checkin.com;

    # Temporary borrowed cert until certbot issues the dedicated one (next step).
    ssl_certificate /etc/letsencrypt/live/ctv.2checkin.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ctv.2checkin.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location = /tbot {
        root /var/www/ctv.2checkin.com;
        try_files /tbot/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /tbot/state/board.json {
        root /var/www/ctv.2checkin.com;
        default_type application/json;
        client_max_body_size 256k;
        dav_methods PUT;
        dav_access user:rw group:rw all:r;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        limit_except GET PUT {
            deny all;
        }
    }

    location ^~ /tbot/ {
        alias /var/www/ctv.2checkin.com/tbot/;
        index index.html;
        try_files $uri $uri/ /tbot/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://127.0.0.1:5375;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }

}
