# ctv.2checkin.com — /tbot moved to report.tjbot.vn. Everything else redirects to tmv.2checkin.com.
server {
    listen 80;
    listen [::]:80;
    server_name ctv.2checkin.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ctv.2checkin.com;

    ssl_certificate /etc/letsencrypt/live/ctv.2checkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctv.2checkin.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # TBot reports moved to report.tjbot.vn.
    location = /tbot { return 301 https://report.tjbot.vn/; }
    location ^~ /tbot/ {
        rewrite ^/tbot/?(.*)$ https://report.tjbot.vn/$1 permanent;
    }

    # Everything else (NK3 app traffic) now lives at tmv.2checkin.com.
    location / { return 301 https://tmv.2checkin.com$request_uri; }
}
