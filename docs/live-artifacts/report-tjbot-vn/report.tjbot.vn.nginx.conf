server {
    server_name report.tjbot.vn;

    root /var/www/report.tjbot.vn;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /state/board.json {
        root /var/www/report.tjbot.vn;
        default_type application/json;
        client_max_body_size 256k;
        dav_methods PUT;
        dav_access user:rw group:rw all:r;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        limit_except GET PUT { deny all; }
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/report.tjbot.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/report.tjbot.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = report.tjbot.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name report.tjbot.vn;
    return 404; # managed by Certbot


}