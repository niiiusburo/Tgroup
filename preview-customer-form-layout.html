<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Form — Appointment Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 20px; }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #d1d5db; }

    .appt-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .appt-input:focus {
      outline: none;
      border-color: #fb923c;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
    }

    .appt-select {
      width: 100%;
      padding: 0.75rem 2.5rem 0.75rem 1rem;
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      line-height: 1.25rem;
      appearance: none;
      transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.75rem center;
      background-repeat: no-repeat;
      background-size: 1.25em;
    }
    .appt-select:focus {
      outline: none;
      border-color: #fb923c;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
    }

    .appt-label {
      display: block;
      font-size: 0.75rem;
      line-height: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .appt-section-title {
      font-size: 0.875rem;
      line-height: 1.25rem;
      font-weight: 600;
      color: #1f2937;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .appt-card {
      background-color: #ffffff;
      border-radius: 1rem;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .appt-card-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-6xl flex flex-col overflow-hidden" style="height: 85vh; max-height: 800px;">
    
    <!-- Header — Appointment style -->
    <div class="relative px-6 py-5 bg-gradient-to-br from-orange-500 via-orange-400 to-amber-400 flex-shrink-0">
      <div class="absolute inset-0 opacity-50" style="background-image: url(&quot;data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4xIj48Y2lyY2xlIGN4PSIzMCIgY3k9IjMwIiByPSIyIi8+PC9nPjwvZz48L3N2Zz4=&quot;);"></div>
      <div class="relative flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-white/20 rounded-xl">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"></path></svg>
          </div>
          <div>
            <h2 class="text-xl font-bold text-white">Chỉnh sửa khách hàng</h2>
            <p class="text-sm text-orange-100 mt-0.5">Cập nhật thông tin hồ sơ bệnh nhân</p>
          </div>
        </div>
        <button type="button" class="p-2 rounded-xl bg-white/20 hover:bg-white/30 transition-colors">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </div>

    <!-- Main form area -->
    <form class="flex flex-1 min-h-0 overflow-hidden">
      
      <!-- Left Panel -->
      <div class="w-80 flex-shrink-0 border-r border-gray-200 flex flex-col gap-4 px-5 py-5 overflow-hidden bg-gray-50/30">
        
        <!-- Card 1: Personal Info -->
        <div class="appt-card" style="max-height: 280px; height: 280px;">
          <div class="appt-card-header">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 0 0-3-3.87M9 20H4v-2a4 4 0 0 1 3-3.87m9-5a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"></path></svg>
              <h3 class="text-sm font-semibold text-gray-800">Thông tin cá nhân</h3>
            </div>
          </div>
          <div class="p-4 overflow-y-auto custom-scrollbar flex-1 min-h-0 space-y-4">
            <!-- Avatar -->
            <div class="flex justify-center">
              <div class="relative w-24 h-24 rounded-full bg-gradient-to-br from-gray-100 to-gray-200 border-2 border-dashed border-gray-300 flex items-center justify-center hover:from-gray-200 hover:to-gray-300 transition-all cursor-pointer group">
                <svg class="w-8 h-8 text-gray-400 group-hover:text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 0 1 2-2h.93a2 2 0 0 0 1.664-.89l.812-1.22A2 2 0 0 1 10.07 4h3.86a2 2 0 0 1 1.664.89l.812 1.22A2 2 0 0 0 18.07 7H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path></svg>
              </div>
            </div>
            <!-- Name -->
            <div>
              <label class="appt-label">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"></path></svg>
                Họ và tên
              </label>
              <div class="relative">
                <input type="text" placeholder="Nhập họ và tên" class="appt-input pr-16" />
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] px-2 py-1 rounded-md border font-medium bg-white text-gray-500 border-gray-200 hover:border-gray-300">IN HOA</button>
              </div>
            </div>
            <!-- Gender -->
            <div>
              <label class="appt-label">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"></path></svg>
                Giới tính
              </label>
              <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                  <input type="radio" name="gender" class="accent-orange-500 w-4 h-4" checked />
                  <span class="text-gray-700">Nam</span>
                </label>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                  <input type="radio" name="gender" class="accent-orange-500 w-4 h-4" />
                  <span class="text-gray-700">Nữ</span>
                </label>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                  <input type="radio" name="gender" class="accent-orange-500 w-4 h-4" />
                  <span class="text-gray-700">Khác</span>
                </label>
              </div>
            </div>
            <!-- Phone -->
            <div>
              <label class="appt-label">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-1.527 2.064c-.497.672-1.398.85-2.118.404a18.09 18.09 0 0 1-6.776-6.776c-.446-.72-.268-1.621.404-2.118l2.064-1.527c.362-.271.527-.733.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 6.75Z"></path></svg>
                Số điện thoại
              </label>
              <div class="flex gap-2">
                <input type="tel" placeholder="0901 111 222" class="appt-input flex-1" />
                <button type="button" class="px-3 py-2 border border-gray-200 rounded-xl text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Card 2: Assignment -->
        <div class="appt-card flex-1 min-h-0">
          <div class="appt-card-header">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0 1 12 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2m4 6h.01M5 20h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z"></path></svg>
              <h3 class="text-sm font-semibold text-gray-800">Phân công</h3>
            </div>
            <span class="text-xs text-gray-400">21 nhân viên</span>
          </div>
          <div class="p-4 overflow-y-auto custom-scrollbar flex-1 min-h-0 space-y-4">
            <!-- Branch -->
            <div>
              <label class="appt-label">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"></path></svg>
                Chi nhánh
              </label>
              <select class="appt-select"><option>-- Chọn chi nhánh --</option><option>Tâm Dentist Quận 7</option></select>
            </div>
            <!-- Sales -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="appt-label" style="margin-bottom: 0;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"></path></svg>
                  Nhân viên sale
                </label>
                <button type="button" class="p-1 text-orange-500 hover:text-orange-600 hover:bg-orange-50 rounded transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
              <select class="appt-select"><option>-- Chọn nhân viên --</option></select>
            </div>
            <!-- CSKH -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="appt-label" style="margin-bottom: 0;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-1.527 2.064c-.497.672-1.398.85-2.118.404a18.09 18.09 0 0 1-6.776-6.776c-.446-.72-.268-1.621.404-2.118l2.064-1.527c.362-.271.527-.733.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 6.75Z"></path></svg>
                  CSKH
                </label>
                <button type="button" class="p-1 text-orange-500 hover:text-orange-600 hover:bg-orange-50 rounded transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
              <select class="appt-select"><option>-- Chọn CSKH --</option></select>
            </div>
            <!-- Source -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="appt-label" style="margin-bottom: 0;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"></path></svg>
                  Nguồn
                </label>
                <button type="button" class="p-1 text-orange-500 hover:text-orange-600 hover:bg-orange-50 rounded transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
              <select class="appt-select"><option>-- Chọn nguồn --</option></select>
            </div>
            <!-- Referral -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="appt-label" style="margin-bottom: 0;">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"></path></svg>
                  Ngưới giới thiệu
                </label>
                <button type="button" class="p-1 text-orange-500 hover:text-orange-600 hover:bg-orange-50 rounded transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                </button>
              </div>
              <select class="appt-select"><option>-- Chọn ngưới giới thiệu --</option></select>
            </div>
          </div>
        </div>

        <!-- Card 3: Notes -->
        <div class="appt-card" style="max-height: 180px; height: 180px;">
          <div class="appt-card-header">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a4.5 4.5 0 0 0-4.5-4.5H10.5Z"></path></svg>
              <h3 class="text-sm font-semibold text-gray-800">Ghi chú</h3>
            </div>
          </div>
          <div class="p-4 overflow-y-auto custom-scrollbar flex-1 min-h-0">
            <textarea placeholder="Ghi chú về khách hàng..." rows="3" class="appt-input resize-none"></textarea>
          </div>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="flex-1 flex flex-col overflow-hidden bg-white">
        
        <!-- Tabs -->
        <div class="flex border-b border-gray-200 flex-shrink-0 px-6 bg-gray-50/30">
          <button type="button" class="px-6 py-4 text-sm font-medium border-b-2 border-orange-500 text-orange-600 transition-all -mb-px">Thông tin cơ bản</button>
          <button type="button" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-all -mb-px">Tiểu sử bệnh</button>
          <button type="button" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-all -mb-px">Hóa đơn điện tử</button>
        </div>

        <!-- Scrollable tab content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar overscroll-contain px-8 py-6">
          <div class="max-w-4xl">
            <!-- Section header matching appointment style -->
            <h3 class="appt-section-title mb-5">
              <svg class="w-4 h-4 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"></path></svg>
              Thông tin chi tiết
            </h3>

            <div class="grid grid-cols-2 gap-x-6 gap-y-5">
              <!-- DOB -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"></path></svg>
                  Ngày sinh
                </label>
                <div class="flex gap-2">
                  <select class="appt-select flex-1"><option>Ngày</option></select>
                  <select class="appt-select flex-1"><option>Tháng</option></select>
                  <select class="appt-select flex-1"><option>Năm</option></select>
                </div>
              </div>
              <!-- Created date -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>
                  Ngày tạo
                </label>
                <input type="text" value="08/04/2026" readonly class="appt-input bg-gray-50 text-gray-500 cursor-default" />
              </div>
              <!-- Title -->
              <div>
                <div class="flex items-center justify-between mb-2">
                  <label class="appt-label" style="margin-bottom: 0;">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"></path></svg>
                    Danh xưng
                  </label>
                  <button type="button" class="p-1 text-orange-500 hover:text-orange-600 hover:bg-orange-50 rounded transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                  </button>
                </div>
                <select class="appt-select"><option>-- Chọn danh xưng --</option></select>
              </div>
              <!-- Customer code -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z"></path></svg>
                  Mã khách hàng
                </label>
                <input type="text" value="(Tự động)" readonly class="appt-input bg-gray-50 text-gray-500 cursor-default" />
              </div>
              <!-- Email -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"></path></svg>
                  Email
                </label>
                <input type="email" placeholder="email@example.com" class="appt-input" />
              </div>
              <!-- Country -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418"></path></svg>
                  Quốc gia
                </label>
                <input type="text" value="Viet Nam" class="appt-input" />
              </div>
              <!-- Weight -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0 0 12 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 0 1-2.031.352 5.988 5.988 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971Zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 0 1-2.031.352 5.989 5.989 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971Z"></path></svg>
                  Cân nặng (Kg)
                </label>
                <input type="number" value="0" class="appt-input" />
              </div>
              <!-- Address -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"></path></svg>
                  Số nhà / Địa chỉ
                </label>
                <input type="text" placeholder="Nhập địa chỉ (ví dụ: 123 Nguyễn Huệ...)" class="appt-input" />
                <p class="mt-1.5 text-xs text-gray-500 flex items-center gap-1">
                  <svg class="w-3 h-3 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"></path></svg>
                  Gõ địa chỉ để tự động điền Tỉnh/Thành, Quận/Huyện, Phường/Xã
                </p>
              </div>
              <!-- Occupation -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.257-4.149.35-6.244.132-1.234-.124-2.458-.41-3.654-.84a.75.75 0 0 1-.475-.928l.99-4.166a.75.75 0 0 1 .822-.58l3.89.348a.75.75 0 0 1 .663.753v1.5a.75.75 0 0 0 1.5 0v-1.5a.75.75 0 0 1 .663-.753l3.89-.348a.75.75 0 0 1 .822.58l.99 4.166a.75.75 0 0 1-.475.928 16.276 16.276 0 0 1-3.654.84c-2.095.218-4.157.125-6.244-.132-1.085-.144-1.872-1.086-1.872-2.18v-4.25M18.75 7.5h-13.5m13.5 0a2.25 2.25 0 0 0 2.25-2.25V4.5a2.25 2.25 0 0 0-2.25-2.25h-13.5a2.25 2.25 0 0 0-2.25 2.25v.75a2.25 2.25 0 0 0 2.25 2.25m13.5 0v1.5a6.75 6.75 0 0 1-6.75 6.75h-1.5a6.75 6.75 0 0 1-6.75-6.75v-1.5"></path></svg>
                  Nghề nghiệp
                </label>
                <input type="text" placeholder="Nhân viên văn phòng" class="appt-input" />
              </div>
              <!-- Province -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"></path></svg>
                  Tỉnh/Thành
                </label>
                <select class="appt-select"><option>-- Chọn Tỉnh/Thành --</option></select>
              </div>
              <!-- Health insurance -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z"></path></svg>
                  Số thẻ bảo hiểm y tế
                </label>
                <input type="text" placeholder="DN4xxxxxxxx" class="appt-input" />
              </div>
              <!-- District -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"></path></svg>
                  Quận/Huyện
                </label>
                <select class="appt-select"><option>-- Chọn Quận/Huyện --</option></select>
              </div>
              <!-- ID -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z"></path></svg>
                  Căn cước / Hộ chiếu
                </label>
                <input type="text" placeholder="0xxxxxxxxx" class="appt-input" />
              </div>
              <!-- Ward -->
              <div>
                <label class="appt-label">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"></path></svg>
                  Phường/Xã
                </label>
                <select class="appt-select"><option>-- Chọn Phường/Xã --</option></select>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer — Appointment style clean footer -->
        <div class="px-6 py-5 bg-gradient-to-b from-gray-50 to-white border-t border-gray-200 flex justify-end gap-3 flex-shrink-0">
          <button type="button" class="px-5 py-2.5 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-all">
            Đóng
          </button>
          <button type="submit" class="flex items-center gap-2 px-6 py-2.5 text-sm font-medium text-white bg-gradient-to-r from-orange-500 to-orange-400 rounded-xl hover:from-orange-600 hover:to-orange-500 transition-all shadow-lg shadow-orange-500/25">
            Cập nhật
          </button>
        </div>
      </div>
    </form>
  </div>

</body>
</html>
