# NK3 host nginx — tracked copy of /etc/nginx/sites-enabled/tmv.2checkin.com
# Reproducible source of truth (host config is NOT auto-deployed from repo).
# To apply on a fresh host: cp to /etc/nginx/sites-enabled/, then: nginx -t && nginx -s reload
# Includes the server-scoped gzip block (the page-load delivery win). NK3-only.

# tmv.2checkin.com — primary domain for NK3 cosmetic LOB (web container :5375).
server {
    listen 80;
    listen [::]:80;
    server_name tmv.2checkin.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tmv.2checkin.com;

    ssl_certificate /etc/letsencrypt/live/tmv.2checkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tmv.2checkin.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # NK3 compression (server-scoped; does NOT touch nk/nk2). Gzip proxied responses so
    # the ~565KB JS bundle and large JSON API payloads (Permissions/employees ~186KB)
    # transfer ~75-85% smaller — the main delivery-layer win for page load.
    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:5375;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }
}
