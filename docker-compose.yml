version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: tgroup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tdental_demo
    volumes:
      - tgroup-pgdata:/var/lib/postgresql/data
      - ./website/demo_tdental_updated.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tdental_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tgroup-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tdental_demo
      JWT_SECRET: tdental-production-secret-key-2026
      PORT: "3002"
      NODE_ENV: production
    ports:
      - "3002:3002"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: /api
    container_name: tgroup-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  tgroup-pgdata:
