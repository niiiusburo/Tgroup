version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: tgroup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tdental_demo
    volumes:
      - tgroup-pgdata:/var/lib/postgresql/data
      - ./website/demo_tdental_updated.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tdental_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tgroup-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/tdental_demo
      JWT_SECRET: ${JWT_SECRET}
      PORT: "3002"
      NODE_ENV: production
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      HOSOONLINE_BASE_URL: ${HOSOONLINE_BASE_URL:-https://hosoonline.com}
      HOSOONLINE_API_KEY: ${HOSOONLINE_API_KEY}
    ports:
      - "127.0.0.1:3002:3002"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: /api
    container_name: tgroup-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5174:80"

volumes:
  tgroup-pgdata:
