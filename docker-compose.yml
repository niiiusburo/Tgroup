version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: tgroup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tdental_demo
    volumes:
      - tgroup-pgdata:/var/lib/postgresql/data
      - ./backups/tdental_demo_vps_20260415_162302.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tdental_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tgroup-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/tdental_demo
      JWT_SECRET: ${JWT_SECRET}
      PORT: "3002"
      NODE_ENV: production
      TZ: Asia/Ho_Chi_Minh
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      HOSOONLINE_BASE_URL: ${HOSOONLINE_BASE_URL:-https://hosoonline.com}
      HOSOONLINE_API_KEY: ${HOSOONLINE_API_KEY}
      HOSOONLINE_USERNAME: ${HOSOONLINE_USERNAME}
      HOSOONLINE_PASSWORD: ${HOSOONLINE_PASSWORD}
      LARK_FEEDBACK_WEBHOOK_URL: ${LARK_FEEDBACK_WEBHOOK_URL}
      LARK_FEEDBACK_WEBHOOK_SECRET: ${LARK_FEEDBACK_WEBHOOK_SECRET}
      TGROUP_PUBLIC_URL: ${TGROUP_PUBLIC_URL:-http://localhost:5175}
      COMPREFACE_URL: ${COMPREFACE_URL:-http://compreface-api}
      COMPREFACE_API_KEY: ${COMPREFACE_API_KEY}
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-service:8000}
      FACE_RECOGNITION_PROVIDER: ${FACE_RECOGNITION_PROVIDER:-local}
      FACE_AUTO_MATCH_THRESHOLD: ${FACE_AUTO_MATCH_THRESHOLD:-0.88}
      FACE_CANDIDATE_THRESHOLD: ${FACE_CANDIDATE_THRESHOLD:-0.80}
      FACE_AUTO_MATCH_MARGIN: ${FACE_AUTO_MATCH_MARGIN:-0.03}
      FACE_MAX_CANDIDATES: ${FACE_MAX_CANDIDATES:-3}
      FACE_MIN_QUALITY: ${FACE_MIN_QUALITY:-0.55}
      FACE_DETECTION_THRESHOLD: ${FACE_DETECTION_THRESHOLD:-0.6}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "127.0.0.1:3002:3002"

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: tgroup-face-service
    restart: unless-stopped
    environment:
      DETECTION_THRESHOLD: ${FACE_DETECTION_THRESHOLD:-0.6}
    ports:
      - "${FACE_SERVICE_BIND_HOST:-127.0.0.1}:${FACE_SERVICE_HOST_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  compreface-postgres-db:
    image: postgres:11.5-alpine
    container_name: compreface-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frs
    volumes:
      - compreface-db-data:/var/lib/postgresql/data

  compreface-api:
    image: exadel/compreface:1.2.0
    container_name: compreface-api
    restart: unless-stopped
    depends_on:
      - compreface-postgres-db
    ports:
      - "${COMPREFACE_BIND_HOST:-127.0.0.1}:${COMPREFACE_HOST_PORT:-8002}:80"
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-postgres-db:5432/frs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ADMIN_JAVA_OPTS: -Xmx1g
      API_JAVA_OPTS: -Xmx4g
      SAVE_IMAGES_TO_DB: "true"
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
      CONNECTION_TIMEOUT: 10000
      READ_TIMEOUT: 60000
      COMPREFACE_API_JAVA_OPTS: -Xmx4g
    volumes:
      - compreface-api-data:/app/model-data

  compreface-core:
    image: exadel/compreface-core:1.2.0
    container_name: compreface-core
    restart: unless-stopped
    environment:
      ML_PORT: "3000"
      IMG_LENGTH_LIMIT: "640"
    depends_on:
      - compreface-api

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: /api
        # Stamp the real git SHA into the bundle so /version.json reports
        # the actual deployed commit instead of "unknown". Set in shell:
        #   export GIT_SHA=$(git rev-parse HEAD) GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        # then `docker compose up -d --build web`. Or use the deploy script,
        # which exports these automatically after running require-clean-tree.sh.
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    container_name: tgroup-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5175:80"

volumes:
  tgroup-pgdata:
  compreface-db-data:
  compreface-api-data:
