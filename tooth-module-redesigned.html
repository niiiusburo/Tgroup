<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chọn răng - Redesigned Module</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: rgba(0,0,0,0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 820px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header h2 { font-size: 17px; font-weight: 600; color: #111; }
    .close-btn {
      background: none; border: none; font-size: 22px; color: #666; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid #e5e5e5;
      flex-wrap: wrap;
      gap: 12px;
    }
    .segmented-control {
      display: flex;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      overflow: hidden;
    }
    .segment-btn {
      padding: 7px 14px;
      font-size: 14px;
      background: #fff;
      border: none;
      border-right: 1px solid #d0d0d0;
      cursor: pointer;
      color: #333;
      font-weight: 500;
      transition: all .1s;
    }
    .segment-btn:last-child { border-right: none; }
    .segment-btn.active {
      background: #e8f4fd;
      color: #0a6ebd;
      box-shadow: inset 0 0 0 1px #0a6ebd;
      position: relative;
      z-index: 1;
    }
    .radio-group {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: #333;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .radio-group input[type="radio"] {
      width: 16px; height: 16px; accent-color: #1976d2; cursor: pointer;
    }
    .content { padding: 20px 18px; }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px 16px;
      justify-content: center;
      align-items: start;
      position: relative;
    }
    .quadrant {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .quadrant.reverse .tooth { flex-direction: column-reverse; }
    .separator-v {
      width: 1px;
      background: #e0e0e0;
      grid-row: 1 / 3;
      grid-column: 2;
      justify-self: center;
    }
    .tooth {
      width: 46px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border: 1px solid #fff;
      padding: 2px;
      transition: border-color .1s;
    }
    .tooth:hover { border-color: #d0d0d0; }
    .tooth.selected {
      border-color: #1a6de3;
      outline: 1px solid #fff;
    }
    .tooth-img {
      width: 40px; height: 75px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .tooth-img img { width: 40px; height: 75px; object-fit: contain; }
    .tooth-num {
      font-size: 13px;
      color: #444;
      padding: 4px 0;
      width: 100%;
      text-align: center;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }
    .tooth.selected .tooth-num {
      background: #1a6de3;
      color: #fff;
    }
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid #e5e5e5;
    }
    .btn {
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .btn-secondary {
      background: #fff;
      color: #333;
      border-color: #ccc;
    }
    .btn-primary {
      background: #1976d2;
      color: #fff;
      border-color: #1976d2;
    }
    .btn-primary:hover { background: #1565c0; }
    .hidden { display: none !important; }
    @media (max-width: 640px) {
      .tooth { width: 40px; }
      .tooth-img, .tooth-img img { width: 34px; height: 64px; }
      .tooth-num { font-size: 12px; }
      .quadrant { gap: 2px; }
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="header">
      <h2>Chọn răng</h2>
      <button class="close-btn" aria-label="Close">×</button>
    </div>
    <div class="toolbar">
      <div class="segmented-control">
        <button class="segment-btn active" data-tab="all">Chọn răng</button>
        <button class="segment-btn" data-tab="upper">Hàm trên</button>
        <button class="segment-btn" data-tab="lower">Hàm dưới</button>
        <button class="segment-btn" data-tab="arch">Nguyên hàm</button>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="dentition" value="permanent" checked> Răng vĩnh viễn</label>
        <label><input type="radio" name="dentition" value="primary"> Răng sữa</label>
      </div>
    </div>
    <div class="content">
      <!-- Permanent -->
      <div id="panel-permanent">
        <div class="view" data-view="all">
          <div class="chart-grid">
            <div class="quadrant" id="perm-q1"></div>
            <div class="separator-v"></div>
            <div class="quadrant" id="perm-q2"></div>
            <div class="quadrant reverse" id="perm-q4"></div>
            <div class="quadrant reverse" id="perm-q3"></div>
          </div>
        </div>
        <div class="view hidden" data-view="upper">
          <div class="chart-grid" style="grid-template-columns: 1fr auto 1fr; align-items: center;">
            <div class="quadrant" id="perm-upper-left"></div>
            <div class="separator-v" style="grid-row: 1;"></div>
            <div class="quadrant" id="perm-upper-right"></div>
          </div>
        </div>
        <div class="view hidden" data-view="lower">
          <div class="chart-grid" style="grid-template-columns: 1fr auto 1fr; align-items: center;">
            <div class="quadrant reverse" id="perm-lower-left"></div>
            <div class="separator-v" style="grid-row: 1;"></div>
            <div class="quadrant reverse" id="perm-lower-right"></div>
          </div>
        </div>
        <div class="view hidden" data-view="arch">
          <div class="chart-grid">
            <div class="quadrant" id="perm-arch-q1"></div>
            <div class="separator-v"></div>
            <div class="quadrant" id="perm-arch-q2"></div>
            <div class="quadrant reverse" id="perm-arch-q4"></div>
            <div class="quadrant reverse" id="perm-arch-q3"></div>
          </div>
        </div>
      </div>
      <!-- Primary -->
      <div id="panel-primary" class="hidden">
        <div class="view" data-view="all">
          <div class="chart-grid">
            <div class="quadrant" id="prim-q1"></div>
            <div class="separator-v"></div>
            <div class="quadrant" id="prim-q2"></div>
            <div class="quadrant reverse" id="prim-q4"></div>
            <div class="quadrant reverse" id="prim-q3"></div>
          </div>
        </div>
        <div class="view hidden" data-view="upper">
          <div class="chart-grid" style="grid-template-columns: 1fr auto 1fr; align-items: center;">
            <div class="quadrant" id="prim-upper-left"></div>
            <div class="separator-v" style="grid-row: 1;"></div>
            <div class="quadrant" id="prim-upper-right"></div>
          </div>
        </div>
        <div class="view hidden" data-view="lower">
          <div class="chart-grid" style="grid-template-columns: 1fr auto 1fr; align-items: center;">
            <div class="quadrant reverse" id="prim-lower-left"></div>
            <div class="separator-v" style="grid-row: 1;"></div>
            <div class="quadrant reverse" id="prim-lower-right"></div>
          </div>
        </div>
        <div class="view hidden" data-view="arch">
          <div class="chart-grid">
            <div class="quadrant" id="prim-arch-q1"></div>
            <div class="separator-v"></div>
            <div class="quadrant" id="prim-arch-q2"></div>
            <div class="quadrant reverse" id="prim-arch-q4"></div>
            <div class="quadrant reverse" id="prim-arch-q3"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      <button class="btn btn-secondary" id="btn-close">Đóng</button>
      <button class="btn btn-primary" id="btn-save">Lưu</button>
    </div>
  </div>

  <script>
    const teethData = {
      permanent: {
        'perm-q1': [18,17,16,15,14,13,12,11],
        'perm-q2': [21,22,23,24,25,26,27,28],
        'perm-q4': [48,47,46,45,44,43,42,41],
        'perm-q3': [31,32,33,34,35,36,37,38],
        'perm-upper-left': [18,17,16,15,14,13,12,11],
        'perm-upper-right': [21,22,23,24,25,26,27,28],
        'perm-lower-left': [48,47,46,45,44,43,42,41],
        'perm-lower-right': [31,32,33,34,35,36,37,38],
        'perm-arch-q1': [18,17,16,15,14,13,12,11],
        'perm-arch-q2': [21,22,23,24,25,26,27,28],
        'perm-arch-q4': [48,47,46,45,44,43,42,41],
        'perm-arch-q3': [31,32,33,34,35,36,37,38],
      },
      primary: {
        'prim-q1': [55,54,53,52,51],
        'prim-q2': [61,62,63,64,65],
        'prim-q4': [85,84,83,82,81],
        'prim-q3': [71,72,73,74,75],
        'prim-upper-left': [55,54,53,52,51],
        'prim-upper-right': [61,62,63,64,65],
        'prim-lower-left': [85,84,83,82,81],
        'prim-lower-right': [71,72,73,74,75],
        'prim-arch-q1': [55,54,53,52,51],
        'prim-arch-q2': [61,62,63,64,65],
        'prim-arch-q4': [85,84,83,82,81],
        'prim-arch-q3': [71,72,73,74,75],
      }
    };

    const selectedTeeth = new Set();

    function renderTeeth() {
      Object.entries(teethData.permanent).forEach(([id, nums]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = nums.map(n => createToothHTML(n)).join('');
      });
      Object.entries(teethData.primary).forEach(([id, nums]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = nums.map(n => createToothHTML(n)).join('');
      });
    }

    function createToothHTML(n) {
      return `
        <div class="tooth" data-num="${n}">
          <div class="tooth-img"><img src="https://tamdentist.tdental.vn/assets/images/teeth/${n}.png" alt="${n}" width="40" height="75"></div>
          <div class="tooth-num">${n}</div>
        </div>
      `;
    }

    renderTeeth();

    // Tab switching
    document.querySelectorAll('.segment-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.tab;
        const activePanel = document.querySelector('input[name="dentition"]:checked').value === 'permanent' ? '#panel-permanent' : '#panel-primary';
        document.querySelectorAll(`${activePanel} .view`).forEach(v => v.classList.toggle('hidden', v.dataset.view !== view));
      });
    });

    // Dentition switching
    document.querySelectorAll('input[name="dentition"]').forEach(r => {
      r.addEventListener('change', () => {
        const isPermanent = r.value === 'permanent';
        document.getElementById('panel-permanent').classList.toggle('hidden', !isPermanent);
        document.getElementById('panel-primary').classList.toggle('hidden', isPermanent);
        const activePanel = isPermanent ? '#panel-permanent' : '#panel-primary';
        const activeTab = document.querySelector('.segment-btn.active').dataset.tab;
        document.querySelectorAll(`${activePanel} .view`).forEach(v => v.classList.toggle('hidden', v.dataset.view !== activeTab));
      });
    });

    // Tooth selection
    document.addEventListener('click', e => {
      const tooth = e.target.closest('.tooth');
      if (!tooth) return;
      const num = parseInt(tooth.dataset.num);
      if (selectedTeeth.has(num)) {
        selectedTeeth.delete(num);
        tooth.classList.remove('selected');
      } else {
        selectedTeeth.add(num);
        tooth.classList.add('selected');
      }
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      alert('Đóng modal');
    });
    document.getElementById('btn-save').addEventListener('click', () => {
      const arr = Array.from(selectedTeeth).sort((a,b) => a-b);
      alert('Đã chọn: ' + (arr.length ? arr.join(', ') : 'Không có răng nào'));
    });
  </script>
</body>
</html>
